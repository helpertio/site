 тогда бы я, может, и пошел. Что-нибудь посмотреть и не сильно напрягаться.\\n\\nПосле этого есть какие-то события в программе альтернативные. Хороший симптом - испытываешь фомо, а куда мне бечь. Это хороший симптом, так и должно быть.\\n\\nПарочка ивентов, потом обед, потом еще парочка ивентов, потом ужин, потом бессмысленный тусич.\\n\\nДля тусича есть какие-то... например, было очень классно в Сербии «Здоровенный костер», и охеренный был формат с нигунами. Вот эти нигуны тоже можно записать в одной из самых лучших форматов. Мотл делал хасидские негуны. Я это обычно объясняю как все, что я люблю в бардовской песне, без всего, чего я не люблю в бардовской песне. Мне на самом деле нравится эта ситуация, когда мы сидим под гитару и поем, При этом обычно у огромного большинства баровских песен совершенно отвратные тексты, просто плохо написанные. А тут как бы хасидские нигуны – это херовина, в которой нету текста. У них есть как бы высказывание, но ты поешь что-то в стиле «рай-най-най», например. И у этого есть мелодия, ты понимаешь, что есть какое-то высказывание, но это высказывание не семантическое, оно как бы невербальное. Это хоровое пение, но очень классное. И мы сидим у костра, оно очень круто. И вот он-то все очень круто ведет. И после этого мы сидели у костра. С одной стороны, через двор чуваки пели в караоке, а нам в караоке было too much. Мы сидели у костра и трепались. И это было очень приятно.\\n\\nЯ думаю, что при этом классно, что программы разнообразные. При этом в дизайне программы иногда есть такой момент, когда я смотрю, в параллель ставят вещи одинаковые, которые понравятся одним и тем же людям. Что они не вот так стояли, а вот так. Иногда, как устроено расположение программы, можно улучшить, на мой взгляд.\\n\\nВажно, что опыт должен быть разнообразный.\\n\\nВ смысле, для отдельного чувака это должны быть и лекции, и ты пошевелился как-то, и что-нибудь поделал творческое, поиграл в игру, что-нибудь.\\n\\nФомо нужно вызывать как раз тем, что ты в один блок ставишь непохожие штуки.\\n\\nВ параллель нужно делать штуки, которые удовлетворяют разные интересы, потенциально разных людей. И когда у человека есть пересечение с этими интересами, тогда у него вызывается фомо. А то, что ты поставил три интеллектуальных доклада в параллели, это не вызывает положительные фомо.\\n\\nСкорее всего, вызывает, куда я пойду и... Однахуйственно, грубо говоря.", "Есть дрейф, а не конфликт. И он, естественно, и так всегда бывает. Как в сериале все начинается с производственной драмы, а заканчивается всегда отношениями. И вот в сообществах такая же херня, что начинается все с какой-то отраслевой специфики, а потом все скатываются все равно в шерринг. В этом смысле я думаю, что нужно поддерживать контраст.\\n\\nКонтраст – это хорошо, должно быть то и другое. При этом интеллектуальные форматы нуждаются в защите, а эмоциональные в защите не нуждаются, потому что они сами себя защитят. То есть они естественным образом всюду пролезут.\\n\\nИ в этом смысле я думаю, что если с предыдущего вопроса использовать принцип, что в каждую параллель вставлять что-нибудь одно интеллектуальное, и этого хватит. Ну, потому что, типа, если ты хочешь интеллектуального, ну, выбирай всегда интеллектуальное, не ходи в другие параллели.\\n\\nМне не очень нравится, я думаю, что это традиционная штука, есть наследие веревок, не знаю, как это, знаешь, есть веревочные тренинги? Ну, короче, на сербском формате это точно было, и на вебокемпе тоже было, это была игра, где мы все лазим, делаем командные дебильные задания.\\n\\nНа последнем кэмпе это были вот эти лесные игры, игры джунглей, зов джунглей, кажется, да? Вот это как бы вроде центральный эвент, и я такой, ну, что-то, по-моему, не в жанр, чуваки, потому что, ну, то есть, как бы, ну, это все механики командообразования, как бы, быстрорастворимые такие. Короче, не очень. Они вообще нужны для того, чтобы снять какие-то барьеры межличностные и дать эмоционального совместного опыта.\\n\\nНо это и так как бы есть. Это весело, чтобы, например, что-то мы кидали эти шарики, ведра. То есть, я не против самих механик этих.\\n\\nПросто я такой, типа... Ну, а зачем? Мы какую цель-то хотим решить этим?\\n\\nПричем она же как бы общая, она безальтернативная. Либо, можешь спать пойти. И ты, конечно, участвуешь в этой игре.\\n\\nЯ делал некоторое количество школ Патанина проектных, отвечал в них за игротехнику. И школа Патанина построена на соревнованиях, И с одной стороны, это действительно увеличивает. Например, в потанинке драйва сильно больше, чем в кемпе. Это как бы хорошо. Но это создает проблемы примерно аналогичные проблемам отбора этические, только уже в самой программе. Ты начинаешь людей сравнивать, но если ты сравниваешь не по-серьезке, то от этого драйва это сильно больше и не добавляется.\\n\\nА если ты их сравниваешь по-серьезски, то с каких херов так? То есть, если будет турнир по водному полу, я буду чувствовать грустно себя, потому что я не умею плавать. А если там будет покер, то ребята, которые не играют в покер, такие, ну, турнир по покеру, ну окей.\\n\\nВ смысле, соревновательные форматы сами по себе нормальные. Я их много раз в жизни делал. Просто любое соревнование очень... Оно явно или неявно постулирует рамку качества. И это качество должно быть определено каким-то фактором, к которому нету претензий.\\n\\nИ при этом все равно будет абьюз метрики, потому что это неизбежно, потому что закон Хика. Но только если у тебя финал не выбирается рандомом.\\n\\nКак сделать?\\n\\nЕсли хочется больше драйва, значит нужно просто больше физухи. Или больше физухи, или больше кранча. Больше кранча и больше физухи можно обеспечить и без соревнований. Например, в RML нет соревнований, но есть и то, и другое. Потому что там все, ну, типа RML, это не подходит тоже для нас, но это проектный формат. И смысл в том, что ты делаешь сначала проектный семинар, проблемный семинар, потом у нас есть сутки на то, чтобы сделать игру. А в следующие сутки каждый из потоков, три потока, каждый потом других игру проводит. И это значит, что игра должна быть сделана. И никто не будет это оценивать, но ты хочешь, чтобы твоя игра прошла хорошо и все не спят всю ночь.", "Cовершенно отвратительный был на Баба Кэмпе закрывающий ивент. Он слишком был затянутый. В общем, не надо делать формат на весь лагерь, когда в спотлайт по очереди передается каждому.\\n\\nНа Баба Кэмпе в конце была свечка. Свечка очень длинная. Все по очереди что-то говорили. Говорили долго. И этот ужасный монодрейм.\\n\\nИ зачем так?\\n\\nЯ думаю, что Ваня просто ошибся. Так не надо для вас. Я думаю, что человек должен быть инвестирован в происходящее. Если я что-нибудь слушаю, то я должен понимать, за каким хером это нужно слушать качественно. Потому что я должен прослушанное потом как-то к этому что-то сделать, отнестись. То есть от качества моего слушания должно что-то зависеть. А если ничего не зависит, то так не надо.", "Короче, с одной стороны да, с другой стороны...\\n\\nЯ помню, что вторая прогулка (на Грузинском кемпе), она очень большого количества мероприятий сильно испортила явку. Потому что это очень длинная херота. И типа спонтанно – хорошо, инфронизация – хорошо. Прогулка особенная, потому что она тебя несколько выводит из магического круга. И когда чуваки сваливают с территории, ну, к этому нужно быть более внимательным, чем ко всему остальному.", "Чекины мне кажутся немножко забавными и традиционными, в смысле я не имею ничего против, но что на самом чекине происходит, сам скрипт чекина ничего особенного не контрибьютит, но хорошо, что у тебя есть группа, с которой ты делаешь хоть что-то.\\n\\nТо есть в этом смысле, было бы круто, если у тебя таких групп было принудительно две разные, и у тебя были с ними какие-то деятельности.\\n\\nНапример, самый такой надежный, простой и часто всего использованный способ менеджерить роли на какой-нибудь игре, они такие. У тебя есть клан и профессия. Это две группы игроков. С одними ты вот это делаешь, с другими ты вот это делаешь. То есть, хорошо, но точно есть способы получить два типа разных опыта с четырех группами людей. И этого тебе хватает для того, чтобы тебе зацепиться. Я думаю, что иметь больше ротации в группах, и когда вы что-то должны делать хорошо,\\n\\nНо сам по себе check-in мне не кажется какой-то особенно классной штукой.\\nЕсли он неплохой, просто он нейтральный.\\n\\nДля финальной точки дня важны долгие разговоры, конечно.", "Мне нравится, то, что Ваня делает, хорошо.", "Конечно, старыми.\\n\\nЕсли выбирать, я бы выбрал со старыми друзьями.\\n\\nНо как бы у Амп Кемпа есть уникальная фича, что... шанс подружиться во взрослом возрасте в нем высокий, и это круто.\\n\\nТо есть в этом смысле очень круто, что есть норма для новичков. И то, что у меня шанс познакомиться есть, это тоже круто.\\n\\nВ смысле, просто если выбирать, то нужно выбирать старых, но вообще-то лучше не выбирать.\\n\\nСовместная деятельность в программе помогает и сближаться с новыми людьми и поддерживать контак со старыми знакомыми. Типа, когда вам предлагают совместно что-то делать. Когда вы делаете что-нибудь в парах, в тройках, это хорошо.", "Это ложная позиция.\\n\\nНа AmpCamp я попал, потому что у меня была программа импрувинга моего нетворка. Потому что я знаю, что мой бизнес так устроен, что если мой нетворк будет больше, то будет от этого больше всякой пользы.\\n\\nПри этом также я знаю, что нормальный способ нетворка, тупой способ нетворка, это пытаться... Короче, если ты в нетворке тянешь одеяло на себя и пытаешься извлекать из нетворка выгоду, то ни хера не срабатывает.\\n\\nПросто не делай так. И хороший нетворк, он обязательно включает в себя хорошее общение. Нужно инвестировать в доверие.\\n\\nЕсть две обязательные штуки.\\n\\nНужно уметь активное слушание и начать с этого. Нужно быть заинтересованным в другом чуваке, любопытным к нему и пытаться ему сделать хорошо. И, ну, кстати, для, значит, если ты хочешь душевное общение, нужно делать ровно то же самое. И просто, ну, как бы, плохой нетворк, просто его не надо делать.", "Я поддерживаю связь после AmpCamp с чуваками, у которых у меня возник какой-нибудь рабочий контекст по поводу AmpCamp.\\n\\nУ меня есть идея, что дружбу надо чем-то кормить, и кормится она совместной деятельностью.", "Получилось долгое рассуждение, без ответа. (там есть интересные мысли, но мне уже лень)", "Это меня слегка смущает, в смысле я так себя вести не буду. Я вообще не пью, и да, я не буду голым публично, но если люди будут голыми, ну ладно.\\n\\nШумно мне окей.\\n\\nПро алкоголь. Если все будут глухие, а я нет, у меня будет впечатление о чужой на этом празднике жизни.\\n\\nЯ его иногда испытываю. С трезвыми людьми мне прикольней.\\n\\nКогда есть альтернативы, где ты можешь выбрать побыть с людьми, где спокойно, там не бухают, может быть норм.\\n\\nПолитика про алкоголь формулируется так - \\"Можно пить, нельзя быть пьяным\\". Как определяется, что ты пьян? Если орг сказал, что ты пьян, то ты пьян. Если ты пьян, то ты идешь к себе в комнату и спишь.\\n\\nА вот оргам пить нельзя.\\n\\nМои радикальные взгляды такие, типа, оргам нельзя пить, потому что орг сетапит норму, поэтому он должен быть в ее крайней позиции.\\n\\nПро оргов это не запрет, это самоограничение обычно. Если орги себе позволяют немножко, то другие могут себе позволить многое.", "Я предполагаю, что есть альтернатива.\\n\\nЭто совершенно нормально.\\n\\nПроверенный временем рецепт, который мне кажется хорошим, он такой, типа, чуваки, пить можно.\\nПротив голыми первой вообще ничего не имею в виду.\\nПока все публично не трахаются, мне окей.\\n\\nИначе это превращается в другой жанр, типа, в оргии я участвовать не буду.\\n\\nКороче то есть пока вы пьете, но вы не пьяный это хорошо как бы вот есть специальный чувак который является критерием вы заранее соглашаетесь что если он к вам подошел и сказал что мы пьяны то мы пьяны если вы примет его ушли спать хорошо.", "Ответ такой, мне ок все, что не сексуализировано.", "Ну, как бы у меня есть запрос на больше дружбы, богу дружбы.\\n\\nОсобенно его стало много после, понятно, эмиграции.\\n\\nИ для меня это среда, в которой у меня есть шанс подружиться с людьми и поддерживать друг друга.\\n\\nЯ про это уже все сказал. (был развёрнутый ответ на другой вопрос, не стал это включать, потому что там очень много, но интересно)", "Есть момент, когда мы собираемся садиться в автобус, ты приходишь на это место, где мы будем сидеть, встречаешь первого чувака, всё, кэмп начался.", "", "Это отличная цена, потому что...\\n\\nМожно ли кэмп провести дешевле? Я надежно знаю, что можно. Можно провести в разы дешевле.\\n\\nПотому что вот я провожу игру в Белграде, там в нос 200 евро. Я немножко угорю по деньгам как организатор, но не сильно. Типа 300 евро хватило бы вот так. И это поселение в базе с едой и так далее. И все нормально.\\n\\nМожно ли сделать дешевле? Можно. Значит, просто это станут приезжать другие люди.\\n\\nХотим ли мы других людей? Хуже ли эти люди, которые не приезжают? Мы не знаем. Текущие люди окей. Значит, она окей.\\n\\nКороче, во-первых, справедливость и цена не надо как бы связывать.\\nТипа, вы заявляете эту цену, чуваки, ну, типа, они что, типа обязаны, ну, в смысле, они обязаны идти на кэмп?\\nНу, типа, какая, нахер, справедливость?\\nО чем?\\n\\nКороче, я знаю, что коммерческие форматы стоили бы дороже раза в полтора.\\n\\nЯ думаю, что моя культура ролевая дает меньше преференций оргам, чем кемповская. И я такой, ну, окей. В смысле, ну, типа, короче, здесь так принято примерно. То есть я думаю что на мой взгляд если бы я из органа это делал, то количество бабла которые тратятся на организацию несколько избыточное не количество усилия количество бабла компенсации прекэмп. Не избыточная не потому, что это несправедливо и не потому, что цена получается другая. Я бы как орг тратил бы меньше.\\n\\nКак участник мне окей.\\n\\nТам вопрос, какую функцию ты оптимизируешь, в смысле, потому что при Кэмп может выполнять разные задачи.", "Я думаю, было бы классно, чтобы были какие-то форматы, которые... \\n\\nЕсли мы хотим, чтобы люди дальше что-нибудь делали, то должны быть сетапы этой деятельности на кемпе.\\nМы что-то начали, и понятно, как мы будем продолжать, и это как-то засетаплено уже.\\n\\nНу, типа, мы, предположим, провели формат про духи, и, типа, это не должно быть обязательно, что такое, но, типа, группа, которая делала формат про духи и духи, если вы хотите дальше исследовать запахи, то, типа, вот можно как это делать, если вы хотите продолжать, вот чатик записывать.\\n\\nТо есть у форматов, например, какого-то воркшопа, классно, если будет продолжение какое-то?\\nКлассно, чтобы у некоторых форматов было продолжение, потому что тогда это дает возможность продолжать возникший интерес.\\nЕсли мы просто скажем, что это продолжение просто сказано...\\n\\nТейк в том, что нужно еще администрирование потом.\\n\\nТо есть, условно говоря, диванчики жили, пока Яне было ни похер на диванчике, она находила чуваков, находила тему, анонсировала, и кто-то на себя это тащил.\\n\\nСамо собой, ничего тащиться не будет."]}, {"id": 12, "cohort": "корги", "answers": ["- отбор людей. Те кто там находятся их качество и это качество основано на качествах.\\n- программа, то как люди взаимодействуют. Не просто собрались, а программа задизайнена. 4 направления — эмоциональная, интеллектуальное, двигательно-игровое и телесное\\n- доверие. Оно формируется по нескольким причинам — нетворк, материальный, ценностный статус.", "", "- Бабакемп. Смотрели очень красивый закат с горы. Люблю природу. Было классно что столько прикольных людей. Кульминационная точка. Было уже и понятно что будет еще\\n- Кадл, который вел я. Было прикольно, расслабленно, супер новый экспириенс. Потрогать друг друга это прикольно.\\n- Круги. Это когда 60-70 человек в одной комнате, садитесь и начинаете обсуждать. Свечка. Круг скорби. Есть эмоции 5-7 базовых, написаны на листке. Я испытываю какую-то эмоцию когда ххх. Что кемп тебе показал. Люди шерились. ПОзволяет засцепиться после. Круги делать сложно. Но можно делать очень круто. Прёт 60 человек, никогда такого не видела и не было. Представляешь такую толпу усадить, чтобы все заткнулись и слушали одного Про форматы сближения — накалять градус тем. 60 человек — не должно запускать глубинную рефлексию. А 20 можно уйти в глубину. Можно пойти прям в жесть — давайте поговорим про то какие сложные ситуации у нас были в жизни — про отношения, про секс. Не так критично.", "- С первого кемпа — чувствовала себя не ок. Проблемно с диванчиками. Не поняла куда идти, диванчики были далеко. Я зашла было тухло. Было ощущение потерянности, я приехал и я НАХЕР не нужен никому. НЕ ЗНАЮ куда себя пристроить.\\n- Бывает перегружает. Классно-классно, бегала по одному ивенту, по другому. Комната интроверта. Вайб, что это не для меня. Я зануда, но это для какие-то еще более зануд. Не люблю развлечения, которые там предлагают.\\n- В такие моменты хорошо бы посмотреть на красоту.\\n- Проблема «активности» — я задолбалась сидеть. Все сидят, у меня есть призыв от тела к активности. А все сидят.", "ответом выше", "- Не знаю когда вставать, я «жадина». Хочется встать 9-10, не позже. Минут 30-35 нужно на раскачку. 30-45 поесть. \\n- Потом должноа начинаться программа. В это время ты еще достаточно тупенький, кофе не подействовал. Хочется каких-то активностей на взаимодействие 1-1, личное поболтать-послушать. Не суперинтеллектуально, но душевно но не в толпе — круги Котова. Двигательная активность, театральная разминка. Что-то такое.\\n- Сначала доклад, потом дискуссия.\\n- Потом нужно поесть.\\n- Мы делаем кофе-брейк после завтрака (для тех кто не успел поесть). Может быть обед повыше. Обычно я ем в 10 и в 13-14. Раздражает что много перекусов. Отстойно, когда нет возможности поесть, а ты хочешь.\\n- Можно опять что-то такое подвигаться. Должно быть более интенсивное и должно дать заряд сил на оставшуюся половину дня. Хочется какого-то взаимодействия с людьми. Около 6-7 еще нормально соображаете. Последний слот когда можно поговорить. Что-то туда такое ставила — интеллектуальная игра. Можно Круг.\\n- После ужина — активности на сближение парами, группками. И потом какая-то Тусовка. Освободились в 5. Пошли на Круг до 7.  В 10 начинается рейв. Он может идти с 10 до двух. И для особо стойких after party.", "- Соотношение форматов. Не хватает форматов про глубину, сближение, хороший контакт где ты узнаешь людей.\\n- Могу сказать каких форматов было много. И мне казалось, что нужно сгладить.\\n- В Гацки был более игровой кемп, чем мне бы хотелось.\\n- Бабакемп был больше про тусовку. Добрая вписка как лагерь для детей, вечеринка.\\n- Последний кемп — совсем не зашла программа. Интеллектуальное более менее.", "", "", "", "", "", "", "", "", "- Алкоголь, нагота, секс. Не люблю когда люди пьют. Я в этом плане немного ту матч. Для меня даже чуть чуть алкоголя уже может быть неприятно. Мне не нравится когда форсируют это. Не понравилось, что на бранч выставили алкоголь.\\n- Нагота — мы не секс вечеринка, зачем нагота. Но если формат подходящий то мб интересно. Секс вечеринка. Про баню. Все может быть как ормат.\\n- По наркотикам я может не показательна, потому что более толерантна", "", "", "", "", "", "", "- Круто что мы проводим звонки\\n- Я бы анализировала все что было, смотрела бы обратную связь. Забирала бы то что заходило. Если зашло — надо повторять. Так не работает.\\n- БАЗА очень важна. Нужно подобрать какие-то хорошие места.\\n- ГОТОВИТЬ проводящих форматы\\n- Хорошо делать объявления — карта развлечений, помочь определить участнику муд. МУДТРЕКИ сформировать\\n- Хорошо бы организовать разговоры про ВАЖНЫЕ темы, очень глубокие и уязвимые — дети, родители, секс, деньги, травмы и тд"]}, {"id": 13, "cohort": "олды", "answers": ["Обязательное участие в программе (не позиция «клиента», а позиция контрибьютора).\\n\\nКомьюнити мейкеров и организаторов — люди, которые делают вещи.\\n\\nНизкая вероятность «ноющих» участников — ожидание, что каждый является частью решения.\\n\\nБаланс состава: есть представители академии и бизнеса.\\n\\nОщущение, что почти с любым участником можно сделать совместный мини-проект.\\n\\nВысокий уровень доверия к качеству людей.\\n\\nНеломаемое ядро: участие + культура мейкерства.", "Не было явных форматов, которые «можно убрать безболезненно».\\nСкорее важно общее ощущение среды, а не конкретные активности.", "Эпизод: диалог со Шмониной.\\nИнсайт: отдых от менторско-лидерской роли.\\n\\nДо: привычная роль — ментор, организатор, объясняющий.\\n\\nВ моменте: осознание, что здесь можно не быть «родителем», люди не нуждаются в ней как в ведущей фигуре.\\n\\nПосле: ощущение освобождения, отдыха от роли.\\n\\nКлюч: глубокий диалог + инсайт про идентичность.", "Личное: из-за болезни пропустила активности.\\n\\nСистемное: организаторы недоступны для общения во время кемпа (они перегружены организацией). Хочется больше делегирования или автопати с орга́ми.", "Не про «не вписываюсь», а про не хватает ресурса:\\n\\nНе хватает сил участвовать во вне-кемповой активности.\\n\\nЖалеет, что не вовлекается больше в онлайн-активности.\\n\\nНет ощущения, что её инициативы были бы «не в тему».", "Выспаться.\\n\\nЗавтрак + разговор с кем-то менее знакомым.\\n\\nИнтеллектуальная искра из разговора → спонтанный ивент.\\n\\nСобственный ивент (прогулка/медитация) → рефлексия участников.\\n\\nМини-лекция от заряженного спикера (важна энергия, не только содержание).\\n\\nПиковый интеллектуальный групповой экспириенс:\\n\\nТеория игр (проживание),\\n\\nHarkness-семинар,\\n\\nСтратегическая групповая игра,\\n\\nТяп-ляп проект за час с презентацией.\\n\\nСпад дня → физически активный, дурацкий формат:\\n\\nИмпров,\\n\\nКарнавальность,\\n\\nТанцы,\\n\\nФэшн-шоу.\\n\\nВажно: после интеллектуального пика нужно карнавальное «заземление», чтобы снизить синдром самозванца.", "Не столько перекос во время кемпа, сколько проблема отсутствия структурированного follow-up после.\\n\\nПредложение:\\n\\nАртефакт (блокнот) для фиксации идей и контактов.\\n\\nПланирование 1–2 дней после кемпа под follow-up.\\n\\nВопросы-подсказки для закрепления ценности.", "В целом — нет.\\nИсключение: когда участники сильно устали.\\n\\nДопустимые варианты:\\n\\nSound healing.\\n\\nКонцерт для лежащих/полуспящих.\\n\\nПросто «смотреть на что-то» — не ценность.", "Поддерживает.\\n\\nДо 25–50% программы может быть гибкой.\\n\\nВажно оставлять слоты под спонтанные инициативы.\\n\\nДаже если качество ниже, это формирует майндсет контрибьюции.", "Прямого ответа не было, но из контекста:\\n\\nФинал должен быть физически активным, дурацким, карнавальным.\\n\\nПомогать сбросить напряжение после интеллектуального блока.", "Очень поддерживает.\\nГлубокий интерес к Authentic Relating.\\n\\nПримеры идеальных форматов:\\n\\n- Воркшоп «как обниматься» (про консент).\\n\\n- Статус-воркшоп (ощущение статуса телесно).\\n\\n- Relating languages.\\n\\n- Формат 20 минут на человека без перебивания.\\n\\nПризнаки:\\n\\n- Есть фасилитация.\\n\\n- Есть инструкции.\\n\\n- Люди работают в парах/тройках.\\n\\nФокус на осознанности, консенте, паттернах общения.", "Прямого выбора не сделано.\\nИз контекста — ценит новые глубокие контакты и проектные связи.", "Ценность в:\\n\\nИнтеллектуальной искре.\\n\\nПроектном потенциале.\\n\\nИнсайтах.\\n\\nГлубине диалога.", "Конкретные имена не названы.\\nНо подчеркнута важность follow-up для закрепления контактов.", "Прямого ответа нет.\\nПо идеальному дню — поддержка групповой динамики и перемешивания.", "Больше всего смущает алкоголь.\\n\\nГолые форматы не смущают.\\n\\nМаленькая пьяная группа — ок.\\n\\nБольшая пьяная группа (20+) — риск инцидентов, травм, плохой динамики.\\n\\nНе верит, что это можно качественно модерировать.", "Малые группы.\\n\\nЧеткая модерация.\\n\\nКонтроль алкоголя.\\n\\nПредпочтение структурированных алкогольных форматов (например, бокал шампанского на балу).", "Ок при:\\n\\nКонсенте.\\n\\nФасилитации.\\n\\nЯсных протоколах.\\n\\nНе ок — хаотичная алкогольная динамика.", "", "", "", "", "Усилить follow-up.\\n\\nДобавить артефакт (блокнот).\\n\\nДелегировать орг-задачи, чтобы орги были доступны.\\n\\nБаланс интеллектуального пика и карнавального сброса.\\n\\nОставлять слоты под спонтанные форматы.\\n\\nЧетко модерировать алкоголь.\\n\\nУсилить качественные форматы на сближение."]}, {"id": 14, "cohort": "исчезнувший", "answers": ["умненькие, странненькие задроты\\nлюди пытаются быть откртее и глубже", "", "пара хороших лекций (образование, HR-тех)\\nшли на полуночную встречу с раввином. болтали в тишине пустых черногорских гор\\nразница в состоянии до-после, приехал загруженным, вернулся перезагруженным", "излишнее желание держать все под котролем и контролировать людей, которые этого не просили (АБр) - связано с опытом организации", "нет. избыточного снобизма никто не проявлял", "все сбалансированно: плотно диванчиков, лекций", "", "", "", "", "не был готов, вышел из формата как только понял про что это\\nв 99% мимо меня", "со старыми недокопанно", "для души. если случайно получается про дело - ок", "взял пару кальнов, тупо пошли их курить. сидели и говорили ни о чем. разговоры глубже, компактно, без модерации, без цели", "", "в них не участвовал, но раздражения нет. сосед по номеру нажрался и пропал. втащить хотелось, но это же проблема модерации. пусть просто будет второй ключ", "", "", "без комьюнити продолжение движухи вряд ли возможно\\nценность приносит. больше ценности приносить не может - в силу личных особенностей. \\nдает мысли подумать как жж", "", "", "справедливо, поехал бы за эти деньги если бы изменились обстоятельства", "если бы я начал на него ездить.. для остальных не знаю, для меня точно"]}, {"id": 15, "cohort": "вне категории", "answers": ["То, что связи, которые там приобретаются, они сохраняются за пределами Амкэмпа и могут перерастать в дружбу, которая существует совершенно вне выездов, а как нечто отдельное само по себе. И таким образом у меня появились друзья какие-то новые, которых до этого не было.", "что бы ни происходило, на кемпе остается на кемпе, и как это в Вегасе, то есть что было в Вегасе, остается в Вегасе. Что бы ни происходило, это никак не влияет, потому что я думаю, что каждый кемп — это какое-то такое некоторое явление, как это, законченное и полноценное своей отдельностью.", "рефлексия, это был, значит, получается какой-то там весенний кемп в Черногории, и там был один момент, когда было круговое вот это собрание, все что-то там делились переживаниями, эмоциями, и потом все, значит, ну не все, но много людей заплакало, потом там все обнимались и так далее. Мне кажется, что это вот прямо про кемп.", "У меня не было опыта, который я бы назвала прямо не окей. Я обычно приезжаю на кемп с пониманием, что не обязана участвовать во всём. Если какой-то формат мне не подходит, я просто в него не иду.\\n\\nПример: кадл-пати. Я не люблю тактильный контакт с малознакомыми людьми, поэтому не участвовала. Мне это было скорее необычно, чем неприятно. Сам формат у меня не вызвал отторжения, просто это не моё.\\n\\nГлавное:\\n\\nне всё должно подходить лично мне;\\n\\nесли формат не откликается, я могу в него не идти;\\n\\nэто не делает формат плохим и не требует обязательно что-то “чинить” или сильнее модерировать;\\n\\nвсе взрослые люди и могут сами держать ответственность за свои границы.", "Про ощущение “я не вписываюсь”\\n\\nУ меня не было ощущения, что я не вписываюсь. Скорее я замечаю, что на кемпе больше людей, которые:\\n\\nболее тактильные,\\n\\nбыстрее проявляют эмоциональную уязвимость.\\n\\nЭто одна из особенностей кемпа: там есть приглашение к открытости и уязвимости.\\n\\nГлавное:\\n\\nдля меня это скорее интересный опыт наблюдения и знакомства с разными способами взаимодействия;\\n\\nя не хотела бы постоянно находиться только в такой среде, но мне интересно с ней соприкасаться;\\n\\nкаждый взрослый человек сам решает, насколько участвовать: можно продолжать, а можно просто выйти из формата.\\n\\nВывод:\\nНе было чувства «я не вписываюсь» — было скорее любопытство и интерес к разным людям и форматам взаимодействия.", "Мне нравятся доклады, мне нравятся какие-то активные форматы, которые вовлекают больше людей. Мне диванчики страшно понравились. Вот когда ты, может, пришел и развесить уши, и слушать, как кто-то что-то обсуждает. Мне очень понравилось. Мне очень понравились всякие фан-вещи, там, типа, Джепарди, ну, своя игра, когда была, мне дико понравилась. Форматы, которые были не мои, я туда не ходила, ну, всякие там ночные посиделки, купания в бассейнах, утренние пробежки. Не потому что мне не нравится, а просто не моё. Я и не ходила.", "Мне нравится, когда на кемпе есть выделенное время просто для общения: полтора–два часа, когда люди могут спокойно сидеть с кофе и разговаривать в своём ритме.\\n\\nТакже мне нравятся хайкинги. Во время прогулки можно свободно перемещаться между людьми и разговаривать с разными участниками. Такой броуновский, ненапряжённый формат общения для меня очень ценен.", "Про финал кемпа и форматы завершения\\n\\nМне нравится, когда в конце организаторы делают финальное закрытие: благодарят участников, аплодируют всем, подводят итог. Такой формат, похожий на закрытие конференции, создает ощущение завершенности и общего праздника.\\n\\nПро бюджет\\n\\nПрезентация бюджета мне показалась не особенно нужной. Я доверяю организаторам и не испытываю потребности видеть подробный разбор расходов. Если кому-то это важно, информацию можно просто выложить в документ.", "Ну, честно, мне нравится программа. Все понятно, можешь выбрать заранее, подумать, куда идти. Вот, сорганизоваться там или проспать наоборот, если что-то неинтересно. Поэтому мне нравится, когда есть организованная программа.", "Про большую групповую рефлексию\\n\\nФормат обсуждения в большом круге мне не очень подошел. Обычно там говорят те, кто и так много говорит, а более тихие участники остаются в стороне. Иногда разговор уходит в очень личную уязвимость, и возникает ощущение давления делиться чем-то подобным. Поэтому ценность такого формата для меня сомнительна.", "Да, это важно", "Мне нравится и то, и то, честно сказать. Мне нравится общение и с новыми, и с старенькими. Это интересно. Но мне абсолютно комфортно было бы только со старыми тоже встречаться, потому что уже есть контекст с людьми, с кем-то ты хочешь пересечься, наболтаться и так далее. И просто там созвон делать по Zoom особо не хочешь, а вот в личном общении это очень мило. В этом смысле интересные то и то, никакого отторжения, отсутствия новичков у меня бы не вызвало. Я считаю, что встречаться с друзьями — это прекрасно.", "Для души, для радости", "Ну, у меня есть несколько знакомых, которые прямо вот амкэмп-амкэмп, и это Ваня, например, Белотелов, да, и у нас с ним прям супер дружба очень близкая выросла из этого, и крючком было то, что, во-первых, Ваня организовывал вот эти общения с друзьями, или не помню, как назывался формат с Даней Рубинштейном и так далее. То есть много есть людей, с которыми я прямо поддерживаю отношения и с удовольствием прямо дружу.", "Я считаю, что менять группу лучше, чем не менять. Потому что ты просто разных людей узнаешь. Да, мне нравится менять группы. Потому что не факт, что ты вначале попадешь в тем, где захочется быть потом. Поэтому лучше меняться.", "Голые - да, но я сама выбираю смотреть на это, участовать или нет", "Хорошо, когда для этого есть отведенное место и время, и - альтернатива для тех, кто не хочет участвовать", "Про обнимания и тактильные форматы\\n\\nДля меня обнимания с малознакомыми людьми — это слишком высокая степень близости. Это связано не с тем, что я не люблю телесный контакт, а с моими личными границами, культурным контекстом и представлением об уважении дистанции. Поэтому я не участвую в форматах вроде кадл-пати.\\n\\nГлавное:\\n\\nтактильные форматы для меня too much, потому что прикосновение — это очень высокий уровень близости;\\n\\nя нормально отношусь к тому, что такие форматы существуют, пока участие добровольное;\\n\\nмне было важно, что никто не принуждал участвовать, и я могла просто не идти.\\n\\nОтношение к формату\\nУ меня есть вопросы к таким практикам. Для меня они выглядят странно, потому что я не до конца понимаю, какую потребность они закрывают. Кроме того, подобные практики напоминают техники из тренингов личностного роста, где через телесность и уязвимость иногда создаётся искусственный «бондинг». Мне ближе более естественное и постепенное формирование близости между людьми.\\n\\nВывод:\\nФормат для меня лично не подходит, но само его существование не вызывает проблем, если участие остаётся добровольным.", "Так, чатик. Мне нравятся в чатике всякие обсуждения разные, делятся люди всяким, иногда споры всякие ажиотажные. Такие, ну просто интересно читать, интересно иногда принимать участие в этих спорах, там, от философско-практических и так далее. Мне это просто интересно очень. Почитывай, знаешь, как читаешь какой-то форум. И вот этот форум, его интересно читать.", "для меня начался в тот момент когда меня встретил на пороге черногорского кэмпа значит вот саша меня встретил и после этого я прямо вот почувствовала себя в прикольно такой значит внимание там позаботились сказали куда идти где обед дали покушать это было очень клёво я Я приехала вне обеда, а там у них была еда, меня покормили, мне было очень приятно. Знаешь, вообще просто это было для меня, ну, для меня вот это был такой важный факт, что, знаешь, не пришел, нашел сам там, типа, комнату, заселился, Дальше в поисках расхаживаешь, значит, по территории, никого не знаешь, ну, так я никого не знала. Вот, а тут вроде как ты приехал, и сразу у тебя кто-то, тебе я рад, отвел тебя куда надо, и еще и накормил. Это было круто.", "Про ожидания и реальность кемпа\\n\\nКогда я принимала решение ехать на кемп, я думала, что это будет похоже на конференцию: встреча людей из разных профессиональных областей, где они делают доклады и делятся экспертизой.\\n\\nНа деле оказалось иначе. На кемпе гораздо больше разных форматов, и среди них много практик, связанных с эмоциональной открытостью, сближением и личным взаимодействием.\\n\\nГлавное:\\n\\nожидание: формат, похожий на профессиональную конференцию;\\n\\nреальность: много разнообразных форматов, включая практики сближения и эмоциональной уязвимости.", "Для меня кемп — это возможность познакомиться с новыми интересными людьми, увидеть другие взгляды на жизнь, попробовать новый опыт и расширить нетворк. У меня нет конкретной цели, я еду скорее за новым опытом и удовольствием от общения.\\n\\nПро цену\\n\\nК цене я отношусь спокойно: организаторы лучше понимают, сколько стоит мероприятие. Я просто оцениваю, подходит ли это мне по бюджету. Но главный ресурс для меня — не деньги, а время.\\n\\nПро главный барьер\\n\\nСамая большая проблема для меня — сложная логистика.\\nКогда до места нужно долго добираться, лететь с несколькими пересадками и тратить на дорогу почти весь день, это становится серьезным барьером.\\n\\nИз-за работы и ограниченного свободного времени мне проще участвовать в событиях, до которых можно быстро добраться — например, прямым рейсом за 1–2 часа.\\n\\nГлавное:\\n\\nценность кемпа — новые люди, опыт и общение;\\n\\nцена не является главным фактором;\\n\\nглавный барьер — долгая и неудобная дорога до локации.", "я считаю, организаторы, они ответственные люди, за это могут на себя брать. В этом смысле это как арт. Вот у тебя есть команда создателей, они создают этот арт-объект, и он каждый индивидуальный, уникальный и ценный имеет смысл. То есть если... И я считаю, что каждый кемп — это вот арт-объект, который полностью имеет ценность как законченный арт-объект. Все молодцы, это всегда круто делают."]}, {"id": 19, "cohort": "бывшие орги", "answers": ["Умники собираются в режиме, когда они не должны быть только умниками. Люди \\"с конференций\\" оказываются в неформальной обстоановке и вынуждены преодолевать внутренние барьеры \\"умников\\". \\n\\nОтбор всем жмёт, но он все равно формирует Camp. Я был на кемпах с неотобранными людьми и охуевал от дискомфорта. Отбор приносит ограничения, но это важная определяющая черта.\\n\\nРад, что в кемпе так и не выработалась универсальная этическая позиция и плюрализм по горячим вопроса принципиально допускается. Часть плюрализма может и задавлена, но могло быть хуже.", "Может не быть экспертных форматов", "У меня было слишком много моментов, чтобы выделить конкретный. Но если про паттерн — я медленный и у меня большая инерция — конкретный формат редко успевает зацепить, но дает первые крючочки и возможность взаимодействовать с людьми дальше — и это меняет всё.", "Для меня негативные моменты, это:\\n- Разные проявления механистичности (транзакционного отношения). Например ожидание коммерческого сервиса от новичков, как будто бы у них есть договоренности об уровне обслуживания (которой нет)\\n- Бывают проблемы с форматами принудительного сближения. Это можно предявить к любым форматам сближения и вообще механичность и легкое принуждение — норма для выхода из обычной колеи. Но иногда это не ок.", "-", "- YCAMP идеален в текущем формате:\\n  - Очень плотная программа, много людей\\n  - Ощущение FOMO - необходимость продолжать потом\\n  - Крючочки и ниточки к другим людям возникают\\n\\n- Практические детали:\\n  - Супер плотная программа с некоторым насилием\\n  - Вставать в 8:00, завтрак в 9+\\n  - Принудительная физическая активность утром\\n  - Чек-ины и чек-ауты обязательно в расписании\\n  - Ротация 3-4 типов форматов в равных долях", "- Альтернативный формат (мой опыт):\\n  - Треть разговоров друг с другом\\n  - Треть творчества\\n  - Треть телесных практик\\n  - Треть пустоты (люди делают что хотят)\\n\\nНет запросов на экспертные форматы", "-", "-", "- Арка через весь YCAMP:\\n  - Кульминация в середине дня и вечер субботы (не в конце)\\n  - До кульминации: постепенно разворачивать, снимать защиты\\n  - После кульминации: сворачивать в более защищенное состояние\\n\\n- Кульминация (суббота день-вечер) должна быть индивидуальной и совместной одновременно:\\n  - У каждого задевается что-то свое\\n  - Движ вокруг помогает о уникальное для Кэмпа и в реальной жизни я его как будто бы все время ищу в реальной жизни. При найме на работу, при общении с какими-то незнакомыми людьми все время хочется, чтобы вот так вот зарабить можно было вот так же легко.\\n\\nЯ думаю, отбор по похожим ценностям этому способствует.\\n\\nЕщё есть уровень доверия и честной открытости ко всякой сомнительной херне. Вот это я не знаю, откуда берется. Возможно, это берется от того, что там те чуваки, которые тебя позвали, ты там как-то им доверяешь, ты готов с ними так и скопорируешь это на всех остальных.\\n\\nВ этом смысле, мне кажется, наш отбор скорее этого мешает. Потому что мы очень-очень подозрительно относимся ко всем кандидатам.\\n\\nУже пришли, уже полное доверие.", "Я буду максимально открытым здесь. И, возможно, раню чувства людей. Прошу прощения.\\n\\nМне кажется, что было супер неок мне, когда... кажется это был третий камп, который Б не организовывал. И он такой, типа, приехал, и такой, типа, что-то все не то. Короче, какое-то говно, шляпа. Я не знаю, не то, чтобы он на меня как-то выливал, но это был супер антивайб. В смысле, что прямо при всей моей любви к Б мне было некомфортно и хотелось что-то с этим поделать.", "Нет.", "* Мне бы хотелось в начале дня, до завтрака, какие-то подвижные активности слэш-сближения.\\n* Потом доклады. Прямо много докладов. Доклады можно, чтобы это были доклады или какие-то более интерактивные форматы. Там Иванович устраивал стратегическую игру. Ну, короче, какие-то вещи, которые больше про интеллект.\\n* Ближе к вечеру, более эмоциональные форматы.\\n* И какая-то вечеринка там, движ там и так далее. Опциональная.\\n\\nУ меня есть сильное мнение по поводу того, как надо организовать вечеринки для большой группы людей.\\nЭто мнение от того, как я организовываю вечеринки JetBrains, и какой у нас есть опыт.\\n\\nВо-первых, хорошо бы, чтобы кроме вечеринки была еще какая-то активность, хандикрафт-активность.\\nЭто все еще вечеринка, вы все еще тусуетесь, но можно засесть в углу и плести венки, грубо говоря.\\nТо есть ты с одной стороны участвуешь во все вечеринки, может с кем-то там разговариваешь, может что-то выпиваешь, но при этом ты как бы занят.\\nИ когда у тебя все свои слова, которые ты хотел спросить человека, спросил, ты все, стоишь без толку.\\n\\nКроме этого, должно быть просто тихое место какое-то.\\nВы туда ушли, там куда-то, и там перетираете.\\nПотом возвращаетесь на вечеринку.\\n\\nНу и еще это как бы JetBrains специфика, что тебе нужно, чтобы можно было что-то сшибать в это время и что-то там выпивать.\\nКороче, что всегда должен быть какой-то такой поток, то есть довольно сильно убивает вайб, когда вы допили последнюю из двух бутылок пива и все. Начинаете что-то суетиться.", "Я из тех, кому не хватает интеллектуальных форматов. В смысле, что на первых кэмпах их было больше, и потом их количество снижалось, и мне кажется, что на том самом Баба Кемпе было маловато их.\\n\\nНо при этом в интеллектуальные форматы я включаю всякого рода бенефис. Например доклад Винка про то, как он бегал с ослом. Интеллектуально в этом не супер много. Не то, что ты такой прямо обогатился. Это скорее развлекательный формат. И это было очень прикольно.\\n\\nМне не очень нравятся Lightning Talk, один слайд Lightning Talk. И мне также не нравятся форматы полтора часа каких-то историй.\\n\\n10-15 минут докладать, топчик.", "Да. Меня они привлекают тем, что можно инициативно расслабиться. То есть ты такой участвуешь в этом, но при этом от тебя ничего не ожидается.", "Я не очень люблю спонтанность. Я люблю, когда программа прибита гвоздями, там есть какое-то окно, какие-то, короче, места, куда можно затолкать свои форматы. Формат с диванчиками, в принципе, с самых первых кемпов, кажется мне неплохим - когда у тебя есть довольно жесткая сетка, и в этой жесткой сетке есть довольно жесткие окна, куда можно свое затолкать.", "Для меня хороший финал дня – это какая-то вечеринка.\\n\\nВы тусуете, вы проводите время друг с другом. К вечеру ты эмоционально устаешь.\\n\\nИ если от тебя требуются… А эти форматы (чекины), чтобы они были хорошие, а не кринж, они требуют от тебя сильного эмоционального и интеллектуального вовлечения. А ты уже уставший, ты будешь хуёво повлекаться.", "Абсолютно да. Нравятся форматы Вани Белотелова. Форматы Вани Белотелова они очень модерируемые и очень хорошие. Прямо топчайшие. Очень нравится участвовать.\\n\\nВ формате сближения комфортно около 4-5 человека в группе.\\n\\nГраница интимности у меня проходит довольно, как бы, поверхностно в плане какой-то тактильности, то есть мне не нравится там очень сильно трогать друг друга, это интимное.\\n\\nНо в смысле самораскрываться, рассказывать какие-то суперподробности, мне кажется, что у меня существенно ниже, чем в среднем.\\n\\nТо есть я готов с малознакомыми людьми очень какие-то интимные подробности обсуждать.\\n\\nПо частоте, мне кажется, что один раз за день утром — это норм.", "Блин, очень сильно зависит. То есть два разных смысла, я не могу их сравнивать, потому что встреча с старыми друзьями, оно комфортинг, а встреча с новыми, оно про прикольно, что-то новое, интересное.\\n\\nЗависит от того, кто эти новые. Если среди этих новых чуваков есть какие-то чуваки, которые прямо интересно. Например, вот мы Диму Безубцева отбирали. Из-за того, что у него есть такой сильный бэкграунд в архитектуре, у меня был большой энтузиазм, потому что мне было просто очень интересно.\\n\\nНо, не знаю, по вайбу с Алдаром тоже всегда очень хорошо.", "Для души.", "Немножечко мы общаемся с Ильей Захаровым, потому что он тоже в JetBrains, но в целом он в супердалеком от меня JetBrains, просто типа бесконечно другое состояние, как и другая компания.\\n\\nС Дашей Платоновой. Даша, мне кажется, зацепила тем, что на первом кэмпе программистов из JetBrains и еще нескольких программистов из Яндекса она была из какой-то другой вселенной. Это было интересно.", "", "Шумные, алкогольные не проблема.\\n\\nГолые немножко кринжуюсь. В смысле, что это неуместно. Но как бы на уровне того, что мне не очень, вот я и не участвую. То есть, если условно это какой-то параллель с вечеринкой, и оно в отдельном месте, где заранее предупреждают, что там будут голые люди, я просто туда не пойду, так абсолютно норм. Люди могут делать что хотят.", "", "", "", "", "", "", ""]}, {"id": 31, "cohort": "олды", "answers": ["через людей.\\nя элитарно-ориентированный человек. прикольная тусовка, где можно пообщаться не только с <колдырями>, но и быть принятым. не очень сильно переживать о чем и как говорить\\nесли я кому-то об этом говорю, то уже есть какойто элаймент по интересам/ценностям. люди читают те же блоги, следят за теми же новостями, имеют схожие интересы, и с ебанцой.", "на мой взгляд, все кемпы очень разные. \\nединственный паттерн - что тебя не хватает на все\\nсначала это бесит, пока ты не понимаешь, что это некоторая гемблинг механика.\\n\\nединственное, что выбивается - старичковый кемп прошлого года. был более расслабленным", "ycamp - первый сухой лед, высыпанный в бассейн\\n\\nпосле очень напряженного дня со всеми кругами ада, контраст с баней, бассейном, вином. был доклад про фотографию жени бабской (я в этом ничего не понимаю + очень увлеченный этим человек). все в купальниках, проектор пробивается через пар. лекция заканчивается, все прыгают в бассейн и высыпают туда 20 кг сухого льда\\nнеожиданный сенсорный и визуальный опыт\\n\\nнравится формат расслабленных лекций - \\"родители говорят на кухне\\". увлеченно говорят о том, что им интересно. всегда прикольно, когда говорящий человек, увлечен", "AmpCamp23 - странный экстра-психологизмом\\nсложно вспомнить конкретное. общее состояние - лезут и пушат: а давайте разговаривать, а давайте про чувства. вызывает ощущение фальши\\n\\nдо определенной степени это можно игнорировать. но мне такие вещи кажутся заигрыванием в сектантство, которое я очень не люблю. возможно делать людей в рамках практики слишком уязвимыми друг перед другом, особенно если есть какая-то сложившаяся иерархия - не ок. у меня срабатывает буллшитометр\\nдержу в голове, что может както пойти не туда.\\nесть разница между застольем и разговорами о важном.\\nуязвимость дает риски использования информации против людей, есть риски директивных людей", "нет\\nесть форматы, в которых я не участвую по разным причинам (чат читать много, анонимный чат)", "", "перекос если и был, то был индуцирован мной", "", "", "", "полезным считаю - это все про новый опыт, людей и связи с ними\\nя участвую не во всех форматах. например, на каддл было интересно находиться, но не участвовать\\nмне комфортнее участвовать в чем-то, что можно назвать несерьезными практиками. несерьезные вещи часто превращаются в понастоязему глубокие вещи", "", "", "человек задавал много вопросов. ему было интересно так, что я считал это искренним\\nважно, что это было спонтанно, а не модерируемые вопросы", "", "", "", "", "", "", "", "", ""]}, {"id": 32, "cohort": "олды", "answers": ["Участники — умные, открытые люди.\\n\\nЕсть ощущение магии происходящего.\\n\\nМного практик сближения, которые мощно работают.\\n\\nПосле этих практик форматы начинают работать намного лучше.\\n\\nПостоянно появляются новые форматы", "Плохая погода.\\n\\nСлабая программа.\\n\\nВозможные конфликты.\\n\\nОтдельные неудачные участники.\\n\\nДаже если не успел поучаствовать во всех форматах.\\n\\nГлавное — если есть практики сближения и сильное комьюнити, кемп всё равно ощущается удачным.", "До:\\n\\nшёл обычный процесс кемпа.\\n\\nВо время:\\n\\nлюди высказывались, подводили итоги.\\n\\nвозникло сильное ощущение соединения.\\n\\nощущение, что 10 человек как будто становятся 100.\\n\\nПосле:\\n\\nосталось ощущение, что появилось что-то новое между людьми.", "Чёткого примера не привёл.\\nСкорее говорил о том, что возможны паузы или странные моменты, но они не критичны.", "Нет, такого ощущения на кемпе не было.", "римерная структура:\\n\\nУтро\\n\\nпробежка / физическая активность.\\n\\nДнём\\n\\nинтеллектуальный формат.\\n\\n1–2 умных доклада.\\n\\nДальше\\n\\nчто-то очень веселое.\\n\\nосознанные практики.\\n\\nСоциальные форматы\\n\\nразговоры в маленьких группах (~10 человек).\\n\\n- диванчики / обсуждения:\\n\\n- чем люди занимаются\\n\\n- как устроена работа\\n\\n- личная жизнь\\n\\n«волшебные» ночные форматы\\n\\nночные активности - РАЗЪЕБ\\n\\nтуристические активности (например хайк).", "Есть перекос в сторону лекций.\\n\\nдлинные рассказы организаторов о том как они делали кемп.\\n\\nМожет ощущаться немного занудно.", "Да.\\n\\nПричины:\\n\\nиногда хочется просто слушать.\\n\\nнормальны форматы:\\n\\nклассный доклад\\n\\nсидеть на диванчике и слушать.\\n\\nВажно:\\n\\nне должно быть их засилья.\\n\\nесли все форматы активные — это ощущается как террор активности.", "Из ответа видно, что спонтанность важна.\\n\\nОна создаёт:\\n\\nощущение живости\\n\\nнеожиданные моменты.", "нет не нужны, только завершение кемпа", "Да, полезны.\\n\\nГлавный фактор:\\n\\nкто модерирует.\\n\\nПримеры хороших:\\n\\nформаты, которые ведёт Ваня\\n\\nформаты Вани и Никиты.", "примерно 50/50.\\n\\nНо важный инсайт:\\n\\nвремя еды — стратегическое.\\n\\nнужно осознанно выбирать, с кем сидеть, потому что таких возможностей немного.", "дружить\\nчеловеческие связи важнее формальных.", "Конкретных людей не назвал.\\n\\nКрючок:\\n\\nличное взаимодействие / общение\\n\\nиногда кто-то пишет после кемпа.", "скорее перемешивание людей.\\n\\nПлюсы:\\n\\nкаждый раз новые разговоры и знакомства.\\n\\nФиксированные группы могут быть интересны, но:\\n\\nлучше короткими эпизодами.", "нет, могу только завидовать", "-", "каддлы - да супер, остальное не пробовал", "чат — это способ оставаться в контакте со знакомыми.\\n\\nощущение, что сообщество продолжается между кемпами.", "Кемп начинается уже в маршрутке по дороге.\\n\\nЧто там происходит:\\n\\nвеселье\\n\\nспонтанность\\n\\nмузыка\\n\\nкараоке\\n\\nнеожиданные активности от самих участников", "Основная ценность:\\n\\nнапитаться эмоциями и ощущениями\\n\\nпринятие\\n\\nширота переживаний.", "справедливая, дешевле вряд ли можно сделать, но это пока я хорошо зарабатываю", "ощущение, что комьюнити зафиксировалось в одной модели отбора.\\n\\nесть некоторая инерция и догмы.\\n\\nнужно больше новых вещей и экспериментов."]}, {"id": 33, "cohort": "олды", "answers": ["Кемп — это выезд примерно на четыре дня, обычно около пятидесяти человек, куда есть отбор. Люди собираются, чтобы делиться опытом и взаимодействовать друг с другом.\\n\\nРаньше программа больше состояла из небольших лекций и докладов: люди рассказывали о своих проектах, экспертизе или о том, что недавно узнали. Со временем формат стал смещаться в сторону процессуальных активностей и совместного опыта: крафтинг, разговоры, совместные практики. Сейчас меньше ориентированности на передачу информации и больше на проживание опыта, отдых и разгрузку.\\n\\nПри этом программа устроена так, что участник сам выбирает, куда идти. Есть расписание и несколько параллельных активностей, и каждый определяет свою траекторию внутри программы.\\n\\nМне нравится, что день обычно устроен ритмично: утром более короткие и интенсивные блоки, а к вечеру активности становятся длиннее и медленнее.", "Важно, чтобы программа вообще была. Но для меня не так критично, какие именно форматы в нее входят, сколько сам факт выбора и разнообразия.\\n\\nЯ бы скорее добавила больше взаимодействия с природой и пространством вокруг. Например, исследовательские активности на месте, где проходит кемп: прогулки, изучение локации, наблюдение за природой.", "Для меня самые сильные моменты связаны с людьми.\\n\\nНапример, когда сначала знакомишься с человеком в неформальной обстановке, а потом идешь на его доклад. Уже есть симпатия и интерес, и вдруг оказывается, что человек еще и очень интересно выступает. Это позволяет увидеть его с другой стороны и укрепляет связь.\\n\\nВообще для меня программа — это способ познакомиться с людьми. Когда человек выступает, задает вопросы аудитории, реагирует на обратную связь, это помогает лучше понять его характер и сформировать образ человека.\\n\\nКак возникает вовлеченность\\n\\nУ меня вовлеченность нарастает через большое количество коротких разговоров. Когда постоянно происходит обмен репликами, микровзаимодействия, ты постепенно набираешь скорость и входишь в ритм общения.\\n\\nИменно через эти микроразговоры и нетворк накапливается энергия, которая потом переносится и на участие в программе.", "Сильного ощущения «мимо вайба» у меня не было.\\n\\nИногда бывает разочарование, когда выбираешь активность, а она оказывается не твоей. Например, формат или подача оказываются совсем не тем, что ожидалось. Но это скорее естественная часть выбора.", "Нет, скорее наоборот: иногда бывает, что происходящее не совпадает с моим состоянием.\\n\\nНапример, форматы вроде песен под гитару с алкогольным вайбом мне сейчас не очень подходят. Для меня это слишком шумно и больше похоже на бездумное коллективное «поорать», чем на интересное взаимодействие.\\n\\nПохожее ощущение было и на очень энергичных вечеринках. Иногда хочется более спокойного вечернего формата: расслабленной атмосферы у бассейна, тихих разговоров, медленного завершения дня.", "Для меня важно выспаться. Если я не выспалась, все остальные активности теряют смысл.\\n\\nОптимально, если программа начинается примерно в десять.\\n\\nДальше:\\n\\nзавтрак и спокойное общение с людьми\\n\\nнебольшой формат знакомства или разговоров, который помогает включиться в день\\n\\nзатем какие-то активности: послушать доклад, поучаствовать в крафтинге, что-то сделать руками\\n\\nпосле обеда — прогулка на пару часов на природе\\n\\nвремя для медленного наблюдения и созерцания: смотреть на растения, слушать звуки, обращать внимание на окружающее\\n\\nзатем игровые или более активные форматы\\n\\nвечером — музыкальная программа, например джем, где люди слушают друг друга и играют вместе\\n\\nМне важно, чтобы день был медленнее, чтобы между блоками было пространство для осмысления и разговоров.\\n\\nЕще мне очень нравятся телесные практики: например, мягкий бодиворк, расслабляющие упражнения, работа с телом.", "Мне показалось, что программа была довольно мягкой и безопасной, скорее ориентированной на интровертов. Всегда была возможность уйти в более спокойный формат.\\n\\nИногда, наоборот, полезны форматы, которые немного выводят из зоны комфорта. Например, один из форматов был для меня не очень комфортным, но при этом оказался ценным опытом.", "Да, для меня они важны.\\n\\nЭто время для рефлексии и завершения. Возможность в последний раз увидеть всех вместе, посмотреть друг на друга, сказать какие-то слова. Если такого момента нет, завершение происходит хаотично, когда люди уже уезжают, и возникает ощущение незаконченности.", "Спонтанность - это важный момент и необходимо, чтобы она была кемпе", "Да, точки для рефлексии и переключения", "Да, они полезны.\\n\\nОсобенно для знакомства новых участников со старыми. Если пускать знакомство на самотек, люди быстро находят пару интересных собеседников и остаются с ними. В итоге многие так и не пересекаются.\\n\\nМодерация помогает перемешивать людей и знакомить тех, кто иначе бы не пересекся.", "Я могу залипнуть в общение со старыми друзьями, потому что это комфортно, и мне важно, чтобы ко мне как-то подмешивались новые люди На кемпе я стараюсь совмещать оба типа общения.\\n\\nС одной стороны, хочется пообщаться со старыми знакомыми. С другой — познакомиться с новыми людьми.\\n\\nДля меня идеальная ситуация — когда в разговор старых друзей естественно включаются новые участники, и они постепенно становятся частью этого круга общения.", "Для души", "Много людей таких", "Хорошо, когда к устойчивой группе добавляют по одному новому", "У меня нет проблем с такими форматами.\\n\\nЯ сама сейчас не пью, но меня не смущает наличие алкоголя. При этом кажется, что сейчас люди относятся к этому более спокойно и не доходят до крайностей.\\n\\nК телесности и обнаженности я тоже отношусь спокойно.", "Как-то так, чтобы решить вопрос звукоизоляции мне нужна ти ески можно замодерировать", "нужно перемешивать", "ВП: негативил, неуважительно относился к окружающим\\n\\nпро форматы: делайте что хотите", "", "", "Раньше было амп == комьюнити, сейчас больше хочу уходить в оффлайн", "опыт смазан организацией\\n\\nбыло классно в f23, когда Бреслав принес мешок смешных шапок. все их надели и начали фоткаться. и в тот момент кемп начался", "ценность точно выше цены.", "не ясно можно ли тут говорить о справедливой цене, но точно можно больше", "нужно сделать что-то, чтобы люди совсем перемешивались, а не создавали кружки по интересам"]}, {"id": 44, "cohort": "Тест", "answers": ["Определение:\\nКэмп — это нетворкинговое событие для друзей, друзей друзей и их окружения, где происходит множество разнообразных активностей, направленных на знакомство и более глубокое общение между людьми.\\nТри ключевых признака:\\n1.\\tРазноформатность — на кэмпе есть разные типы активностей (интеллектуальные, игровые, телесные, спортивные, социальные).\\n2.\\tНетворкинг — люди знакомятся и расширяют круг общения.\\n3.\\tГлубокая коммуникация — цель взаимодействия не формальная, а направленная на более близкое узнавание друг друга.\\nНеломаемый элемент:\\nЦеленаправленная коммуникация и попытка подружиться. Если убрать этот компонент, кэмп превращается просто в обычное мероприятие.", "На субъективное ощущение удачного кэмпа мало влияют бытовые условия, такие как:\\n•\\tуровень проживания\\n•\\tпитание\\n•\\tкомфорт инфраструктуры\\nЭти вещи приятны, но не являются ключевыми. Главное — коммуникация и взаимодействие между людьми.\\nТакже наименьший интерес вызывают:\\n•\\tспортивные активности\\n•\\tлекционные форматы\\nБольше всего ценятся форматы, которые создают контекст для знакомства и сближения, включая даже неразговорные форматы (например, танцы или вечеринки).", "3. Пример сильного опыта на кэмпе\\nФормат: командная игра (например, \\"Своя игра\\").\\nЧто сделало опыт сильным:\\n•        командная динамика\\n•        азарт\\n•        коллективное переживание\\n•        ощущение сплочения\\nВажные элементы:\\n•        соревновательный формат\\n•        командная работа\\n•        вовлеченность участников\\n•        харизматичный ведущий\\nНеважные элементы:\\n•        конкретная игра или механика\\n•        тема игры\\nГлавное — командность и азарт, а не содержание. Можно ли воспроизводить такие сильные моменты\\nДа, вероятность таких моментов повышается, если:\\n•\\tформат проходит не в самом начале кэмпа\\n•\\tучастники уже немного знакомы\\n•\\tформат объединяет большую часть участников\\n•\\tведущий активно вовлекает людей и эмоционально ведёт процесс", "Неудачный опыт — кадл (обнимательный формат), который проводили Ваня и Оксана\\nПричины:\\n•\\tслишком длинный онбординг (около часа)\\n•\\tнесоответствие контексту программы\\n•\\tплохое расположение в расписании\\n•\\tформат был обязательным для всех\\nКонтекст:\\nНакануне была расслабленная вечеринка в бассейне, где люди уже взаимодействовали свободно, поэтому формализованный формат сближения выглядел искусственно.\\n6. Как можно было исправить ситуацию\\nМинимальные вмешательства:\\n•\\tсократить онбординг\\n•\\tостановить затянувшийся процесс прямо на месте\\nБолее серьёзные изменения:\\n•\\tпоменять местами форматы (кадл и вечеринку)\\n•\\tсделать кадл необязательным форматом\\nВывод:\\nКадл плохо работает как формат для всех.", "Это происходит в двух случаях:\\n1.\\tСлишком заумные форматы\\n2.\\tСложные интеллектуальные игры\\nПричины:\\n•\\tсложные правила\\n•\\tперегруженные концепции\\n•\\tнедоступный язык объяснения\\nЧто могло бы исправить:\\n•\\tболее понятная подача\\n•\\tпростые правила\\n•\\tописание формата заранее\\nИгры на кэмпе должны быть скорее фановыми, чем сложными.", "Утро\\n•\\tспокойное начало\\n•\\tспорт или зарядка\\n•\\tнеспешное общение за завтраком\\nДо обеда\\n•\\tпрогулки\\n•\\tпоходы\\n•\\tобщение на ходу\\nПосле обеда (пик активности)\\n•\\tдискуссии\\n•\\tинтерактивные форматы\\n•\\tигры\\n•\\tтелесные практики\\n•\\tимпровизация\\nВечер\\n•\\tформаты более глубокого общения\\n•\\tшеринги\\n•\\tразговорные практики\\nФинал\\n•\\tяркая общая активность:\\no\\tвечеринка\\no\\tтанцы\\no\\tпросмотр фильма\\no\\tобсуждение", "По ощущениям баланс на прошлых кэмпах был достаточно удачным.\\nВ программе присутствовали:\\n•\\tинтеллектуальные форматы\\n•\\tтелесные активности\\n•\\tформаты сближения\\n•\\tразвлекательные активности\\nПерекоса в сторону интеллектуальных форматов не ощущалось.", "Да, но они должны быть:\\n•\\tкороткими\\n•\\tяркими\\n•\\tне затянутыми\\nПримеры:\\n•\\tоткрытие\\n•\\tзакрытие\\n•\\tпросмотр фильма\\n•\\tконцерт\\nЖелательно, чтобы после пассивного формата происходило взаимодействие участников (обсуждение, танцы и т.п.).", "Спонтанные форматы\\nСпонтанные активности — очень важная часть кэмпа.\\nОни:\\n•\\tобъединяют людей\\n•\\tдают возможность голосовать «ногами»\\n•\\tпозволяют формироваться естественным группам\\nЗадача организаторов — предусмотреть пространство, где это возможно.\\nСвободное время\\nЛучше не прописывать в программе блок \\"ничего не делать\\".\\nВместо этого стоит создавать разные зоны активности, например:\\n•\\tуголок интроверта\\n•\\tзона настольных игр\\n•\\tкараоке\\n•\\tспокойные разговорные зоны\\nЭто позволяет людям выбирать свой формат отдыха.", "Финал дня должен быть:\\n•\\tобщим для всех\\n•\\tкоротким\\n•\\tярким\\n•\\tэмоциональным\\nПримеры:\\n•\\tсмешная подборка фото дня\\n•\\tнебольшой перформанс\\n•\\tтанец\\n•\\tмини-подведение итогов\\nЭто создаёт эмоциональный импульс перед вечерней тусовкой.", "Эффективные форматы:\\n•\\tчек-ины в малых группах\\n•\\tрегулярное перемешивание участников\\n•\\tпереходы между форматами (большая группа → малые → пары)\\nНеэффективные:\\n•\\tповторение одной и той же группы\\n•\\tслишком формализованные знакомства", "Баланс примерно равный.\\nНо если выбирать:\\n•\\tпредпочтение отдаётся старым знакомым, потому что с ними глубже отношения.\\nНовые знакомства требуют больше усилий.", "Для души", "Очень многих знала до кемпа; самое яркое знакомство - Дарья М.", "Нужно регулярное перешивание участников", "Негатив возникает, если:\\n•\\tучастники не предупреждены\\n•\\tнеясны правила формата\\n•\\tвозникает ощущение давления участвовать\\nВажно:\\n•\\tзаранее обозначать формат\\n•\\tописывать уровень открытости (алкоголь, нагота и т.д.)", "Заранее обозначать и предупреждать, что такой формат будет; не стремиться затащить туда всех + точно давать альтернативу для тех, кому такие форматы не заходят", "Нормально, к собственной наготе сейчас относится совершенно не парясь", "Дать свободу чату", "Начало:\\nУже в автобусе по дороге на кэмп, когда люди начинают знакомиться.\\nОкончание:\\nПосле официальной программы, в хвостах общения, когда люди продолжают тусоваться небольшими группами.", "Я организатор", "-", "Ключевые факторы:\\n•\\tэмоциональная насыщенность\\n•\\tразнообразие форматов\\n•\\tбаланс между программой и свободой\\n•\\tпространство для спонтанных взаимодействий\\nГлавная задача — сочетать структурированную программу и свободу участников."]}], "questions": ["Q1. Если бы ты объяснял(а) человеку, который никогда не был: по каким признакам ты объяснишь, что это именно AmpCamp, а не просто выезд или мероприятие?", "Q2. Что может происходить на кемпе, но тебе всё равно — это не влияет на ощущение «кемп удался»?", "Q3. Вспомни один самый сильный момент — конкретный эпизод. Опиши, что было до, что происходило в моменте, что было после.", "Q4. Вспомни один конкретный момент, когда тебе было заметно не ок, разочаровало или было мимо вайба. Что произошло?", "Q5. Было ли ощущение «я не вписываюсь»? Если да — в какой момент и из-за чего?", "Q6. Представь один идеальный день кемпа. Составь его из блоков и расскажи, что и в каком порядке происходит.", "Q7. Про вечный конфликт соотношения форматов: что сейчас, по твоим ощущениям, перекошено?", "Q8. Нужны ли форматы, где участники пассивны, а не активны, например открытия или закрытия? Если да — чем они тебя привлекают?", "Q9. Хотелось бы тебе участвовать больше в спонтанных форматах, не закрепленных в программе? Или спонтанность плохо влияет на динамику?", "Q10. Нужны ли финальные точки дня? Каким должен быть финал, чтобы он был в тему, а не кринж?", "Q11. Считаешь ли ты полезными модерируемые форматы на сближение? Нравится ли тебе в них участвовать? Опиши идеальный для тебя формат сближения или его признаки.", "Q12. Во что ты больше вкладываешься: встречи со старыми друзьями или знакомство с новыми? Если бы пришлось выбрать одно — что важнее?", "Q13. Каких знакомств хочется больше: для души, для пользы или другое? Как ты отличаешь одно от другого по ощущениям или результату?", "Q14. Назови один–два человека, с кем ты поддерживаешь связь после кемпа. Что было общим крючком, который закрепил контакт?", "Q15. Тебе больше нравятся форматы сближения в фиксированных группах или когда люди перемешиваются? В чём ты видишь плюсы и минусы фиксированных групп? Было ли желание сменить группу?", "Q16. Вызывают ли у тебя негативные эмоции шумные, алкогольные или голые форматы? Какой негативный эффект они дают, если дают?", "Q17. Как такие форматы можно было бы проводить для желающих, чтобы они не вызывали у тебя негативных эмоций и чтобы разные группы могли сосуществовать?", "Q18. Телесная близость, обнимашки, каддлы и интимные форматы: что для тебя ок или не ок и где проходят границы?", "Q19. Какую ценность для тебя несет комьюнити и или чат между кемпами? Требуется ли там больше или меньше модерации?", "Q20. Когда ты чувствуешь, что кемп для тебя начался? Что является спусковым крючком для начала кемпа и что является его окончанием?", "Q21. Когда ты принимал(а) решение ехать в последний раз, какую ценность ты ожидал(а) получить? После кемпа что совпало, а что нет?", "Q22. Как ты оцениваешь цену: справедливо, скорее дорого или точно дорого? Почему?", "Q23. Что, на твой взгляд, может сделать кемпы лучше?"]}');

var currentMode = "person";
var selectedPerson = null;
var selectedQuestion = null;
var activeCohorts = {};

var ALL_COHORTS = [];
(function() {
  var seen = {};
  for (var i = 0; i < DATA.campers.length; i++) {
    var co = DATA.campers[i].cohort;
    if (!seen[co]) { seen[co] = true; ALL_COHORTS.push(co); }
  }
  ALL_COHORTS.sort();
})();

function esc(text) {
  var d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function init() {
  document.getElementById("subtitle").textContent =
    "CampDev Interviews \u00b7 " + DATA.campers.length + " respondents \u00b7 " + DATA.questions.length + " questions";

  var tabs = document.getElementById("modeTabs");
  tabs.innerHTML =
    '<div class="mode-tab active" id="tab-person">По участникам</div>' +
    '<div class="mode-tab" id="tab-question">По вопросам</div>';
  document.getElementById("tab-person").addEventListener("click", function() { setMode("person"); });
  document.getElementById("tab-question").addEventListener("click", function() { setMode("question"); });

  renderSidebar();
}

function setMode(mode) {
  currentMode = mode;
  selectedPerson = null;
  selectedQuestion = null;
  activeCohorts = {};

  document.getElementById("tab-person").className = "mode-tab" + (mode === "person" ? " active" : "");
  document.getElementById("tab-question").className = "mode-tab" + (mode === "question" ? " active" : "");

  renderSidebar();
  renderMain();
}

function renderSidebar() {
  var sb = document.getElementById("sidebar");
  sb.className = "sidebar" + (currentMode === "question" ? " wide" : "");
  var html = "";

  if (currentMode === "person") {
    var sorted = DATA.campers.slice().sort(function(a, b) { return a.id - b.id; });
    html += '<div class="sidebar-label" style="padding-top:12px">Участники</div>';
    for (var i = 0; i < sorted.length; i++) {
      var c = sorted[i];
      var count = 0;
      for (var j = 0; j < c.answers.length; j++) { if (c.answers[j].trim()) count++; }
      if (count === 0) continue;
      html += '<div class="sidebar-item' + (selectedPerson === c.id ? ' active' : '') + '" data-pid="' + c.id + '">' +
        '<span class="id-badge">#' + c.id + '</span>' +
        '<span class="cohort-label">' + esc(c.cohort) + '</span>' +
        '<span class="answer-count">' + count + '</span></div>';
    }
  } else {
    html += '<div class="sidebar-label" style="padding-top:12px">Вопросы</div>';
    for (var i = 0; i < DATA.questions.length; i++) {
      var q = DATA.questions[i];
      var m = q.match(/Q\d+/);
      var num = m ? m[0] : "Q" + (i + 1);
      var qText = q.replace(/Q\d+\.\s*/, "");
      var ac = 0;
      for (var j = 0; j < DATA.campers.length; j++) {
        if (DATA.campers[j].answers[i] && DATA.campers[j].answers[i].trim()) ac++;
      }
      html += '<div class="sidebar-item' + (selectedQuestion === i ? ' active' : '') + '" data-qid="' + i + '">' +
        '<span class="id-badge">' + num + '</span>' +
        '<span class="q-text">' + esc(qText) + '</span>' +
        '<span class="answer-count">' + ac + '</span></div>';
    }
  }
  sb.innerHTML = html;

  // Attach click listeners via delegation
  sb.onclick = function(e) {
    var item = e.target.closest(".sidebar-item");
    if (!item) return;
    if (currentMode === "person") {
      selectedPerson = parseInt(item.dataset.pid);
      renderSidebar();
      renderMain();
    } else {
      selectedQuestion = parseInt(item.dataset.qid);
      renderSidebar();
      renderMain();
    }
  };
}

function isCohortActive(cohort) {
  var anyActive = false;
  for (var k in activeCohorts) { if (activeCohorts[k]) { anyActive = true; break; } }
  if (!anyActive) return true;
  return !!activeCohorts[cohort];
}

function toggleCohort(cohort) {
  if (cohort === "_all") {
    activeCohorts = {};
  } else {
    activeCohorts[cohort] = !activeCohorts[cohort];
    if (!activeCohorts[cohort]) delete activeCohorts[cohort];
  }
  renderMain();
}

function renderMain() {
  var main = document.getElementById("main");
  var html = "";

  if (currentMode === "person") {
    if (selectedPerson === null) {
      main.innerHTML = '<div class="empty-state"><div class="arrow">\u2190</div>Выберите участника слева</div>';
      return;
    }
    var camper = null;
    for (var i = 0; i < DATA.campers.length; i++) {
      if (DATA.campers[i].id === selectedPerson) { camper = DATA.campers[i]; break; }
    }
    var count = 0;
    for (var j = 0; j < camper.answers.length; j++) { if (camper.answers[j].trim()) count++; }

    html += '<div class="main-title">#' + camper.id + ', ' + esc(camper.cohort) + '</div>';
    html += '<div class="main-meta">' + count + ' из ' + DATA.questions.length + ' ответов</div>';

    for (var i = 0; i < DATA.questions.length; i++) {
      var q = DATA.questions[i];
      var m = q.match(/Q\d+/);
      var num = m ? m[0] : "Q" + (i + 1);
      var qText = q.replace(/Q\d+\.\s*/, "");
      var answer = camper.answers[i] || "";
      var isEmpty = !answer.trim();
      html += '<div class="qa-card">' +
        '<div class="question"><span class="q-num">' + num + '</span>' + esc(qText) + '</div>' +
        '<div class="answer' + (isEmpty ? ' empty' : '') + '">' + (isEmpty ? '\u2014 нет ответа \u2014' : esc(answer)) + '</div></div>';
    }
  } else {
    if (selectedQuestion === null) {
      main.innerHTML = '<div class="empty-state"><div class="arrow">\u2190</div>Выберите вопрос слева</div>';
      return;
    }
    var q = DATA.questions[selectedQuestion];
    var m2 = q.match(/Q\d+/);
    var num = m2 ? m2[0] : "Q" + (selectedQuestion + 1);
    var qText = q.replace(/Q\d+\.\s*/, "");

    var allAnswered = [];
    for (var i = 0; i < DATA.campers.length; i++) {
      var c = DATA.campers[i];
      if (c.answers[selectedQuestion] && c.answers[selectedQuestion].trim()) {
        allAnswered.push(c);
      }
    }
    var filtered = [];
    for (var i = 0; i < allAnswered.length; i++) {
      if (isCohortActive(allAnswered[i].cohort)) filtered.push(allAnswered[i]);
    }

    html += '<div class="main-title"><span style="color:var(--accent-dim);font-family:JetBrains Mono,monospace;font-size:16px;margin-right:10px">' + num + '</span>' + esc(qText) + '</div>';
    html += '<div class="main-meta">' + filtered.length + ' из ' + allAnswered.length + ' ответов</div>';

    // Cohort filters
    var anyActive = false;
    for (var k in activeCohorts) { if (activeCohorts[k]) { anyActive = true; break; } }
    html += '<div class="cohort-filters" id="cohortFilters">';
    html += '<div class="cohort-btn' + (!anyActive ? ' active' : '') + '" data-cohort="_all">все</div>';
    for (var i = 0; i < ALL_COHORTS.length; i++) {
      var co = ALL_COHORTS[i];
      html += '<div class="cohort-btn' + (activeCohorts[co] ? ' active' : '') + '" data-cohort="' + esc(co) + '">' + esc(co) + '</div>';
    }
    html += '</div>';

    for (var i = 0; i < filtered.length; i++) {
      var c = filtered[i];
      html += '<div class="respondent-answer">' +
        '<div class="resp-label">#' + c.id + '<span class="resp-cohort">' + esc(c.cohort) + '</span></div>' +
        '<div class="resp-text">' + esc(c.answers[selectedQuestion]) + '</div></div>';
    }
  }

  main.innerHTML = html;
  main.scrollTop = 0;

  // Attach cohort filter listeners
  var filters = document.getElementById("cohortFilters");
  if (filters) {
    filters.onclick = function(e) {
      var btn = e.target.closest(".cohort-btn");
      if (!btn) return;
      toggleCohort(btn.dataset.cohort);
    };
  }
}

init();
</script>
</body>
</html>
