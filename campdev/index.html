<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmpCamp · CampDev Interviews</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eceae4;
    --border: #ddd9d0;
    --border-active: #bbb6aa;
    --text: #2c2a26;
    --text-dim: #6b6760;
    --text-muted: #9e998f;
    --accent: #b37a2b;
    --accent-dim: #9a6820;
    --accent-glow: rgba(179, 122, 43, 0.07);
    --q-bg: #eeece6;
    --answer-bg: #fafaf8;
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Literata', Georgia, serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }

  .header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header .subtitle {
    font-size: 13px;
    color: var(--text-dim);
  }

  .mode-tabs {
    display: flex;
    gap: 0;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .mode-tab {
    padding: 14px 24px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .container {
    display: flex;
    min-height: calc(100vh - 120px);
  }

  .sidebar {
    width: 200px;
    min-width: 200px;
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    background: var(--surface);
  }
  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0 20px 10px;
  }
  .sidebar-item {
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    border-left: 2px solid transparent;
  }
  .sidebar-item:hover {
    background: var(--surface2);
  }
  .sidebar-item.active {
    background: var(--accent-glow);
    border-left-color: var(--accent);
  }
  .sidebar-item .id-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 28px;
  }
  .sidebar-item.active .id-badge {
    color: var(--accent);
    font-weight: 500;
  }
  .sidebar-item .answer-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .main {
    flex: 1;
    padding: 28px 40px 60px;
    overflow-y: auto;
    max-width: 900px;
  }
  .main-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .main-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }

  .qa-card {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
    background: var(--surface);
  }
  .qa-card:hover {
    border-color: var(--border-active);
  }
  .qa-card .question {
    padding: 14px 18px;
    background: var(--q-bg);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }
  .qa-card .question .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-dim);
    margin-right: 8px;
  }
  .qa-card .answer {
    padding: 16px 18px;
    background: var(--answer-bg);
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.7;
  }
  .qa-card .answer.empty {
    color: var(--text-muted);
    font-style: italic;
    font-size: 13px;
  }

  .respondent-answer {
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    margin-left: 20px;
  }
  .respondent-answer .resp-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent-dim);
    margin-bottom: 6px;
  }
  .respondent-answer .resp-text {
    white-space: pre-wrap;
    font-size: 14px;
    line-height: 1.65;
  }

  .empty-state {
    color: var(--text-muted);
    text-align: center;
    padding: 80px 20px;
    font-size: 15px;
  }
  .empty-state .arrow {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-active); }

  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    .main { padding: 20px; }
    .header { padding: 20px; }
    .mode-tabs { padding: 0 20px; }
  }
</style>
</head>

<script>
const DATA = {"campers": [{"id": 40, "name": "", "answers": ["Сообщество людей, схожих по ценностям и с похожим контекстом. На ивентах тусим и делимся этим контекстом. Но кемп это больше про сообщество, чем про мероприятие\nСовместная объединяющая деятельность", "Комфорт и всякие шеринги не важны. Спонтанные, ни к чему не обязывающие активности", "2023 - мастер-класс по написанию стихов с Риммой. С тех пор 3 года пишет стихи\nПочему: сначала обернула кек в стих.\nОпыт хорошо структурирован. Интересно, как люди вокруг начинают оперировать новым инструментом по-разному", "1. 2023 - шеринг оргов про то, как мы делаем кемп\nзанудно. людям надо шмотки собирать и прощаться, а это похоже на какое-то собрание в школе\n\n2. знакомства 2024F - хотела поверхностно поговорить со многими людьми, а пришлось слушать нытье.", "1. разговор с ЛЛ и ВЗ.\nмы из разных миров и никогда наши миры не сойдутся. никогда концептуально, эмоционально не сможем сойтись\n(контрпример - Мика В. живет в тех же обстоятельствах, но с ним норм)\n2. когда все переходят на свой корпоративный сленг\n\nс этим ничего не надо делать, это ок", "легкая невыспатость, проснуться рано утром\nкофе - сразу, без приключений\nутреннее шоу\nблок интеллектуальной нагрузки (доклад, дебаты, скандал - напрячь мозги)\nперерыв + возможность физической активности\nпосле обеда интеллектуальная игра + взаимодействия\nвечер - пассивно воспринимать (например, lightning talks)\nмаксимально свободный слот (музыкальный джем, вечеринка у бассейна, вечерняя йога)\nуютно поболтать/послушать (например late night show) - чтобы можно было не сильно вовлекаться\n\n\nсвободное время не нужно, могу сбегать\nпик дня - 9-11 утра", "по качеству не хватает интеллектуальных форматов\nслишком много около-психологических форматов (шеринги и тд)\nнепроработанные игры непонятного формата", "непонятно, зачем нужны форматы без активного участия\nоткрытие/закрытие - это символические точки\nопыт кемпа гермитичен, поэтому ему нужно задавать рамку", "не помню удачных спонтанных активностей, кроме каддла. хочу идти по программе\nеду на кемп за сконструированным опытом", "должно быть то, чем этот конкретный день запомнится. не обязательно финал или начало. \nне уверена, что этот опыт можно замодерировать", "понравились все не-ванины (ВБ) форматы на сближение\nнапример, что самого кринжового произошло с тобой за год? и вот незнакомые друг другу люди травят байки\n\nзнакомства ВБ плохо.  такое можно на третий день, в нормальном контексте. \nне обязательно лезть в душу.\nсовместная готовка отлично сближает", "надо баланс. хочу новых людей. общаюсь ли с ними - зависит скорее от ресурса", "для кека", "АУ, ДП\nкрючки: сплетни, кеки, случайные глубокие разговоры\n\nгипотетически можно замодерировать", "нужно перемешивать", "ВП: негативил, неуважительно относился к окружающим\n\nпро форматы: делайте что хотите", "", "", "Раньше было амп == комьюнити, сейчас больше хочу уходить в оффлайн", "опыт смазан организацией\n\nбыло классно в f23, когда Бреслав принес мешок смешных шапок. все их надели и начали фоткаться. и в тот момент кемп начался", "ценность точно выше цены.", "не ясно можно ли тут говорить о справедливой цене, но точно можно больше", "нужно сделать что-то, чтобы люди совсем перемешивались, а не создавали кружки по интересам"]}, {"id": 14, "name": "", "answers": ["умненькие, странненькие задроты\nлюди пытаются быть откртее и глубже", "", "пара хороших лекций (образование, HR-тех)\nшли на полуночную встречу с раввином. болтали в тишине пустых черногорских гор\nразница в состоянии до-после, приехал загруженным, вернулся перезагруженным\nвы должны удивить аудиторию. пока у нее открыт рот от удивления, в него можно что-нибудь запихнуть", "излишнее желание держать все под котролем и контролировать людей, которые этого не просили (АБр) - связано с опытом организации", "нет. избыточного снобизма никто не проявлял", "все сбалансированно: плотно диванчиков, лекций\nне хватило понимания формата мастер-майнда, поэтому опыт получился смызанным", "", "", "", "", "не был готов, вышел из формата как только понял про что это\nв 99% мимо меня", "со старыми недокопанно", "для души. если случайно получается про дело - ок", "взял пару кальнов, тупо пошли их курить. сидели и говорили ни о чем. разговоры глубже, компактно, без модерации, без цели\nпоэтому форматы сближения, где люди обнюзиваются сами, лучше работают, чем модерированные", "", "в них не участвовал, но раздражения нет. сосед по номеру нажрался и пропал. втащить хотелось, но это же проблема модерации. пусть просто будет второй ключ\nне надо ожидать от людей на кемпе что они не нажрутся", "", "", "без комьюнити продолжение движухи вряд ли возможно\nценность приносит. больше ценности приносить не может - в силу личных особенностей. \nдает мысли подумать как жж\nв анонимном слишком токсик, вышел", "", "", "справедливо, поехал бы за эти деньги если бы изменились обстоятельства\nза 1500 долларов уже начнет вызывать вопросы", "если бы я начал на него ездить.. для остальных не знаю, для меня точно"]}, {"id": 13, "name": "", "answers": ["Обязательное участие в программе (не позиция «клиента», а позиция контрибьютора).\n\nКомьюнити мейкеров и организаторов — люди, которые делают вещи.\n\nНизкая вероятность «ноющих» участников — ожидание, что каждый является частью решения.\n\nБаланс состава: есть представители академии и бизнеса.\n\nОщущение, что почти с любым участником можно сделать совместный мини-проект.\n\nВысокий уровень доверия к качеству людей.\n\nНеломаемое ядро: участие + культура мейкерства.", "Не было явных форматов, которые «можно убрать безболезненно».\nСкорее важно общее ощущение среды, а не конкретные активности.", "Эпизод: диалог со Шмониной.\nИнсайт: отдых от менторско-лидерской роли.\n\nДо: привычная роль — ментор, организатор, объясняющий.\n\nВ моменте: осознание, что здесь можно не быть «родителем», люди не нуждаются в ней как в ведущей фигуре.\n\nПосле: ощущение освобождения, отдыха от роли.\n\nКлюч: глубокий диалог + инсайт про идентичность.", "Личное: из-за болезни пропустила активности.\n\nСистемное: организаторы недоступны для общения во время кемпа (они перегружены организацией). Хочется больше делегирования или автопати с орга́ми.", "Не про «не вписываюсь», а про не хватает ресурса:\n\nНе хватает сил участвовать во вне-кемповой активности.\n\nЖалеет, что не вовлекается больше в онлайн-активности.\n\nНет ощущения, что её инициативы были бы «не в тему».", "Выспаться.\n\nЗавтрак + разговор с кем-то менее знакомым.\n\nИнтеллектуальная искра из разговора → спонтанный ивент.\n\nСобственный ивент (прогулка/медитация) → рефлексия участников.\n\nМини-лекция от заряженного спикера (важна энергия, не только содержание).\n\nПиковый интеллектуальный групповой экспириенс:\n\nТеория игр (проживание),\n\nHarkness-семинар,\n\nСтратегическая групповая игра,\n\nТяп-ляп проект за час с презентацией.\n\nСпад дня → физически активный, дурацкий формат:\n\nИмпров,\n\nКарнавальность,\n\nТанцы,\n\nФэшн-шоу.\n\nВажно: после интеллектуального пика нужно карнавальное «заземление», чтобы снизить синдром самозванца.", "Не столько перекос во время кемпа, сколько проблема отсутствия структурированного follow-up после.\n\nПредложение:\n\nАртефакт (блокнот) для фиксации идей и контактов.\n\nПланирование 1–2 дней после кемпа под follow-up.\n\nВопросы-подсказки для закрепления ценности.", "В целом — нет.\nИсключение: когда участники сильно устали.\n\nДопустимые варианты:\n\nSound healing.\n\nКонцерт для лежащих/полуспящих.\n\nПросто «смотреть на что-то» — не ценность.", "Поддерживает.\n\nДо 25–50% программы может быть гибкой.\n\nВажно оставлять слоты под спонтанные инициативы.\n\nДаже если качество ниже, это формирует майндсет контрибьюции.", "Прямого ответа не было, но из контекста:\n\nФинал должен быть физически активным, дурацким, карнавальным.\n\nПомогать сбросить напряжение после интеллектуального блока.", "Очень поддерживает.\nГлубокий интерес к Authentic Relating.\n\nПримеры идеальных форматов:\n\n- Воркшоп «как обниматься» (про консент).\n\n- Статус-воркшоп (ощущение статуса телесно).\n\n- Relating languages.\n\n- Формат 20 минут на человека без перебивания.\n\nПризнаки:\n\n- Есть фасилитация.\n\n- Есть инструкции.\n\n- Люди работают в парах/тройках.\n\nФокус на осознанности, консенте, паттернах общения.", "Прямого выбора не сделано.\nИз контекста — ценит новые глубокие контакты и проектные связи.", "Ценность в:\n\nИнтеллектуальной искре.\n\nПроектном потенциале.\n\nИнсайтах.\n\nГлубине диалога.", "Конкретные имена не названы.\nНо подчеркнута важность follow-up для закрепления контактов.", "Прямого ответа нет.\nПо идеальному дню — поддержка групповой динамики и перемешивания.", "Больше всего смущает алкоголь.\n\nГолые форматы не смущают.\n\nМаленькая пьяная группа — ок.\n\nБольшая пьяная группа (20+) — риск инцидентов, травм, плохой динамики.\n\nНе верит, что это можно качественно модерировать.", "Малые группы.\n\nЧеткая модерация.\n\nКонтроль алкоголя.\n\nПредпочтение структурированных алкогольных форматов (например, бокал шампанского на балу).", "Ок при:\n\nКонсенте.\n\nФасилитации.\n\nЯсных протоколах.\n\nНе ок — хаотичная алкогольная динамика.", "", "", "", "", "Усилить follow-up.\n\nДобавить артефакт (блокнот).\n\nДелегировать орг-задачи, чтобы орги были доступны.\n\nБаланс интеллектуального пика и карнавального сброса.\n\nОставлять слоты под спонтанные форматы.\n\nЧетко модерировать алкоголь.\n\nУсилить качественные форматы на сближение."]}, {"id": 4, "name": "", "answers": ["Кэмп отличается уникальным форматом, сочетающим интеллектуальное, эмоциональное и физическое \nГлавное отличие кэмпа — люди, близкие по ценностям и духу участников \nНельзя ломать компанию уникальных людей и атмосферу доверия на кэмпе \nМагия сближения — критически важный элемент, отличающий кэмп от других мероприятий", "Перекос форматов (если при этом сохраняется ощущение сближения)\n\nНаличие пассивных форматов\n\n(Конкретные примеры «всё равно что происходит» — не упоминались)", "Совмес ло застолье в Сербии. Застолье ассоциируется с замшелыми традициями. Тосты прерывают разговор.", "- после застолья было ощущение «я не вписываюсь». Все развалилось. Организаторы назвали несуществующее место для диванчика. Ощущение потерянности. Либо идти на караоке, либо ныть с теми кто не любит караоке.", "Идеальный день — пятница или суббота:\n- Пятница.\n    - Первая половина дня ты чувствуешь какие все классные и как тут офигенно\n    - Вторую половину дня ты чувствуешь что с этими людьми ты становишься другим, погружаешься в классные и глубокие вещи. Подурачиться. Впечатление что ты в окружении интересных людей. Они тобой тоже интересуются. Нетривиальные взаимодействия. Под конец хочется ощущения, что невозможно остановиться.\n    - Нужно засетапить\n- Суббота\n    - Просыпаешься. Включаешься в этот день. А там эти люди, которые тебя вчера стали родными. Нужно почувствовать подтверждение, что это все было на самом деле. Очень полезно порефлексировать, как-то замедлиться, что впечатлений много у всех и их нужно перерабатывать. Утренние чек-ины в субботу очень полезны. \n    - Довольно серьезный стандарт глубины задавать с утра. Можно отдохнуть на докладах (послушать кого-то\n    - Хочется включиться в подтверждение того что это всё происходит.\n    - В субботу офигенно, когда возникают спонатннные форматы\n    - Яркий финал субботы — большое яркое переживание. Кадл пати. Круговой шеринг. В какой момент кто себя чувстует\n    - Общий круг где все вспомнили что они вместе.\n    - КЛАССНЫЙ финал субботы — старики пошли спать, а те кто покрепче не могут разойтись уже второй день. Место, откуда классно не расходиться.\n- Четверг все приезжают в шоке\n    - Важно как прошёл автобус. Не видел хороших примеров организации. Как идея — мотивировать людей пересаживаться на остановках. Многие были бы рады, но стесняются. Модерация может выглядеть дико.\n    - Очень помогает, когда участники почувствовали, что о них позаботились. Приходили с карточками помогать — это очень такая маленькая и хорошая забота. ЧЕМ БОЛЬШЕ ЗАБОТЫ люди почувствовали тем лучше. Хорошая навигация на базе, упрощение людям геморроя. Почувствовать что о них позаботились.\n    - Кто-то больше устал, кто-то меньше. Последние форматы перетекали в свободное общение.\n    - От ЕДЫ пляшем\n- Воскресенье\n    - Всегда велик соблазн забить на утренние форматы. Если есть сетап чтобы люди сами потратили время. Воскресные форматы — хорошо бы урвать кусочек темпа. Попиздеть, порефлексировать\n    - Важно что часть людей уедет утром и уже всё.\n    - Финальный аккорд должен произойти. Идеальное вск — что-то осмысленное поделали утром (медленное, внутрь). И потом сделали паузу и вышли на финальный процесс закрытия. \n    - Лучше всего сердечные искренние слова на закрытии от участников. Какой-то круг. Здорово когда это направлено на благодарность, что ты забираешь с собой. Полезно попросить обратную связь. Финальный эмоциональный аккорд и после этого направить людей на что-то, что даст им импульс. Нужно дать людям собрать вещи.", "Категории форматов\n- Эмоциональное\n- Интеллектуальное\n- Телесно-двигательное\n- Подурачиться\n\nИнтеллектуальное было не очень интенсивное. Перекосы в недостаток эмоционального сближения. Не очень разумно сбалансированные. Телесно-двигательные — на них много кто не пошел, были те кто не пошел. Например «конкретная спортивная игра» — на это не все пойдут.\n\nПрикольная игра по станциям Зов Джунглей — дешевый способ подурачиться. Многие люди не знают что они так могут подурачиться. \n\nНасильственное общение — это было хорошо, хоть я сам пропустил.\n\nРолевые игры про экономику тоже имеют такое свойство.", "", "", "", "Форматы сближения\n- 1. Обнимашки\n- Нотисинг («я замечаю»). Чекин + майндфулнесс + нотисинг.\n- «Зеркало» — рассказываешь проблему, её пересказывают и ты себе даешь самому себе советы.\n- Кадл пати хочется повторять\n- Чек-ины\n- Гугл-геймс\n- «Я не знаю про тебя»\n- Сближающие круги (аля овершеринг; «синдром самозванца»)\n- Рефлексия «что со мной произошло», «что здесь было необычного».\n- Благодарности в какой-либо форме.\n- Овершеринг (12 человек потолок, который можно хорошо модерировать)\n- Диванчик про кринжовые увлечения\n\nПлохие форматы на сближение — те что плохо реализованы, зависит от ведущего", "", "", "", "", "- достаточно не запирать людей в этих активностях\n- очень не люблю чушь и когда ведут себя агрессивно и не люблю когда люди курят траву — начинают нести чушь\n- ограничивал бы наркотики кроме алкоголя\n- не начинать пить рано — до конца актиновстей\n- разная чувствительность к алкоголю, но влияет на всех и люди не всегда хорошо оценивают про себя", "", "", "", "", "", "", "— Заниматься программой. Подумать как строится опыт участника последовательно. Помогает поговорить с предыдущими.\n- Наращиваться количество свободного времени. В субботу нужно больше свободного времени чем в пятницу. Это конфликтует с программой и это сложно сделать, но я бы хоть разок это сделал.\n- Задуматься как ты сам проводишь свой кемп. Точку рефлексии — задуматься о том, что ты хочешь поменять. За оставшиеся полтора дня я хотел бы «что-нибудь». \n- Делать кемпы более тактильными — хорошее направление, которым многим поможет. Нужно эксперементировать.\n- Пение, резонация тела — нетривиальный опыт. Люди не понимают что это физическая активность. Не физкультура, а что-то что дает тебе почувствовать тело как ты обычно не чувствуешь."]}, {"id": 12, "name": "", "answers": ["- отбор людей. Те кто там находятся их качество и это качество основано на качествах.\n- программа, то как люди взаимодействуют. Не просто собрались, а программа задизайнена. 4 направления — эмоциональная, интеллектуальное, двигательно-игровое и телесное\n- доверие. Оно формируется по нескольким причинам — нетворк, материальный, ценностный статус.", "", "- Бабакемп. Смотрели очень красивый закат с горы. Люблю природу. Было классно что столько прикольных людей. Кульминационная точка. Было уже и понятно что будет еще\n- Кадл, который вел я. Было прикольно, расслабленно, супер новый экспириенс. Потрогать друг друга это прикольно.\n- Круги. Это когда 60-70 человек в одной комнате, садитесь и начинаете обсуждать. Свечка. Круг скорби. Есть эмоции 5-7 базовых, написаны на листке. Я испытываю какую-то эмоцию когда ххх. Что кемп тебе показал. Люди шерились. ПОзволяет засцепиться после. Круги делать сложно. Но можно делать очень круто. Прёт 60 человек, никогда такого не видела и не было. Представляешь такую толпу усадить, чтобы все заткнулись и слушали одного Про форматы сближения — накалять градус тем. 60 человек — не должно запускать глубинную рефлексию. А 20 можно уйти в глубину. Можно пойти прям в жесть — давайте поговорим про то какие сложные ситуации у нас были в жизни — про отношения, про секс. Не так критично.", "- С первого кемпа — чувствовала себя не ок. Проблемно с диванчиками. Не поняла куда идти, диванчики были далеко. Я зашла было тухло. Было ощущение потерянности, я приехал и я НАХЕР не нужен никому. НЕ ЗНАЮ куда себя пристроить.\n- Бывает перегружает. Классно-классно, бегала по одному ивенту, по другому. Комната интроверта. Вайб, что это не для меня. Я зануда, но это для какие-то еще более зануд. Не люблю развлечения, которые там предлагают.\n- В такие моменты хорошо бы посмотреть на красоту.\n- Проблема «активности» — я задолбалась сидеть. Все сидят, у меня есть призыв от тела к активности. А все сидят.", "ответом выше", "- Не знаю когда вставать, я «жадина». Хочется встать 9-10, не позже. Минут 30-35 нужно на раскачку. 30-45 поесть. \n- Потом должноа начинаться программа. В это время ты еще достаточно тупенький, кофе не подействовал. Хочется каких-то активностей на взаимодействие 1-1, личное поболтать-послушать. Не суперинтеллектуально, но душевно но не в толпе — круги Котова. Двигательная активность, театральная разминка. Что-то такое.\n- Сначала доклад, потом дискуссия.\n- Потом нужно поесть.\n- Мы делаем кофе-брейк после завтрака (для тех кто не успел поесть). Может быть обед повыше. Обычно я ем в 10 и в 13-14. Раздражает что много перекусов. Отстойно, когда нет возможности поесть, а ты хочешь.\n- Можно опять что-то такое подвигаться. Должно быть более интенсивное и должно дать заряд сил на оставшуюся половину дня. Хочется какого-то взаимодействия с людьми. Около 6-7 еще нормально соображаете. Последний слот когда можно поговорить. Что-то туда такое ставила — интеллектуальная игра. Можно Круг.\n- После ужина — активности на сближение парами, группками. И потом какая-то Тусовка. Освободились в 5. Пошли на Круг до 7.  В 10 начинается рейв. Он может идти с 10 до двух. И для особо стойких after party.", "- Соотношение форматов. Не хватает форматов про глубину, сближение, хороший контакт где ты узнаешь людей.\n- Могу сказать каких форматов было много. И мне казалось, что нужно сгладить.\n- В Гацки был более игровой кемп, чем мне бы хотелось.\n- Бабакемп был больше про тусовку. Добрая вписка как лагерь для детей, вечеринка.\n- Последний кемп — совсем не зашла программа. Интеллектуальное более менее.", "", "", "", "", "", "", "", "", "- Алкоголь, нагота, секс. Не люблю когда люди пьют. Я в этом плане немного ту матч. Для меня даже чуть чуть алкоголя уже может быть неприятно. Мне не нравится когда форсируют это. Не понравилось, что на бранч выставили алкоголь.\n- Нагота — мы не секс вечеринка, зачем нагота. Но если формат подходящий то мб интересно. Секс вечеринка. Про баню. Все может быть как ормат.\n- По наркотикам я может не показательна, потому что более толерантна", "", "", "", "", "", "", "- Круто что мы проводим звонки\n- Я бы анализировала все что было, смотрела бы обратную связь. Забирала бы то что заходило. Если зашло — надо повторять. Так не работает.\n- БАЗА очень важна. Нужно подобрать какие-то хорошие места.\n- ГОТОВИТЬ проводящих форматы\n- Хорошо делать объявления — карта развлечений, помочь определить участнику муд. МУДТРЕКИ сформировать\n- Хорошо бы организовать разговоры про ВАЖНЫЕ темы, очень глубокие и уязвимые — дети, родители, секс, деньги, травмы и тд"]}, {"id": 3, "name": "", "answers": ["В самом общем смысле, это попытка очень сильно интеллектуальных людей быть в какой-то своем изводе аутентичности.\nИ там дальше эта аутентичность может быть не только интеллектуальной, но и творческой приблизости, уязвимостью. Про спорт, про что угодно в целом.\nВот эта часть аутентичности может быть разнообразной, но как будто бы какой-то довольно объединяющей штукой является какая-то подчеркнутая интеллектуальность.\n\nНельзя ломать аутентичность.\nНельзя ломать какое-то такое пространство, где ты говоришь, окей, вот мы отобрали людей, и этим людям есть что показать.\nИ это что-то, может быть любым видом безумия.\nИ вот это вот «я разрешаю тебе делать любой вид безумия», диванчик про войну в Израиле или скучный доклад, все что угодно вот там.\nМне кажется, сама возможность сделать все, что угодно.", "Доклады. Презираю доклады, хуйня.", "Первое, что мне приходит на ум, это когда я проводила мастер-классы, первый кэмп, первый мастер-класс, это был разъёбный, и я думаю, что тут какая-то комбинация того, что это мой первый кэмп плюс мой первый мастер-класс в жизни и плюс то, какой эффект он имел, это было у меня сильным. То есть там сильно было моё волнение до, какая-то синергия, то есть я охуела от количества людей, которые пришли, но при этом при этом насколько много валидации ты получаешь после, при этом она вся очень искренняя, это было важно.\n\nОхуенные голодные игры получились. Вот этот вот верёвочный курс. Это было просто весело, легко, развлекательно и при этом очень объединяюще. Мне такое нравится.\nЭмоционально мощно получилась, как мне кажется, свечка в конце. Потому что там было не очень много людей, и от этого мне было очень скучно. И при этом это как-то было очень много шеринга искренности.\nПри этом мне то же самое в случае с турецким кэмпом понравилось меньше, потому что там было в два раза больше людей, и это начинает размываться, было думать.\n\nЯ думаю, что там момент случая сильно выше, чем все что угодно, потому что ты можешь придумать охуенный формат, и при этом люди будут не в том настроении, и все.\nЯ думаю, что сделать кэмп, то есть собрать всех этих людей, это уже достаточно для того, чтобы такое могло происходить.\nА то в какой момент в эти четыре дня это произойдет, когда-то для кого-то произойдет.", "Первое — это когда ко мне один из кемперов подходит, предлагает обняться, мы с ним обнимаемся, и тут я обнаруживаю себя в объятиях человека, с которым я вообще-то обниматься не хочу.\nНо это моя проблема, если это просто какая-то штука про то, что обычно я инициирую тактильность, и мне было необычно, когда я оказалась в ситуации, когда мне проинициировали это, а я даже не поняла, что мне вообще-то не очень хочется.\n\nВ общем, я думаю, что у некоторых людей в целом есть больше открытости к телесности в случае с Кэмпом, и я лично пока что не очень умею с этим взаимодействовать, и это умеренно приятно.\n\nВторое — это просто скучные доклады.\nЯ была на нескольких очень скучных докладах, где ты сидишь такой, типа, я проёбываю своё время, потому что я плевала на тему, и на всё это...\n\nЕщё было несколько не очень приятных подкатов ко мне.\nИ они были такие, типа, ты когда сидишь и думаешь, бля, я же, ну, знаешь, просто обычно бывает, что ты как девчонка, ты такая, типа, начинаешь вспоминать, как именно ты намекнула на то, что это стало возможным, а я такая сижу и думаю, бля, я же даже никак не намекала.\nКак тебе вообще в голову пришло, как мне с этим подойти.\n\nЕсть люди, которые себя периодически довольно небезопасно ведут.\nКогда ты видишь, что человек напился и явно деструктивно по отношению к себе в первую очередь себя ведёт и немножко не считывает собственную неуместность, это какая-то штука, которая есть.\nНо с этим не норм. Это не вещь, которая сильно бесит.\n\nНо когда это происходит, когда у вас был момент, и он нарушился, потому что третий пришел и начал себя странно вести, это неприкольно.", "Нет, никогда не было. Ну, блин, я не зна льшой уткой.\n- И дальше уже кто что хочет, а я спать.", "Да, смешное, я тут очень добавила, но, кстати, я, видишь, поскольку не была на последнем кемпе, я не знаю, как выглядел спост там, но, насколько я знаю, предыдущие два кемпа, типа сербский и турецкий, это были довольно нетипичные кемпы, потому что на них было не очень много докладов, поэтому сказать, что перекос есть в сторону докладов, я не уверена, что это так. Вот, да, и вот мне хочется каких-то активностей, которые не через вербальное объединяют людей, вот.", "Вот, ну, ты сказала про смешное, про... Да, смешно, я тут очень добавила, но, кстати, я, видишь, поскольку не была на последнем кемпе, я не знаю, как выглядел спост там, но, насколько я знаю, предыдущие два кемпа, типа сербский и турецкий, это были довольно нетипичные кемпы, потому что на них было не очень много докладов, поэтому сказать, что перекос есть в сторону докладов, я не уверена, что это так. Вот, да, и вот мне хочется каких-то активностей, которые не через вербальное объединяют людей, вот.", "Я не думаю, что это можно и нужно контролировать, потому что если спонтанное что-то будет происходить, оно произойдет. Потому что все на кемпе происходит добровольно. Если люди хотят объединиться, что-то сделать. Они объединяются, что-то сделают.\n\nУ нас, например, был замечательный спонтанный диванчик про секс. Топ прошёл. Один из лучших.\n\nНо тут есть сложность. Я помню, что я читала в анонимном чате, что на чей-то формат, который запланирован, люди не пришли, потому что пошли на какой-то спонтанный поход, по-моему.\n\nЯ точно не хотела бы быть человеком, который стоит один в аудитории, подготовивший что-то, к которому, кому никто не пришёл.\nИ вообще, мне кажется, самая сложная и болезненная штука – это организовывать форматы таким образом, чтобы хотя бы пару людей туда пришли.\nВот это вот точно не то, что должно страдать, просто из уважения к готовящимся.\nВсё остальное вообще похуй.\n\nТочно спонтанность — это супер. И нужно тогда точно проявить заботу к запланированному.", "Мне кажется, чекауты дня – это сложнее штука, потому что люди скорее в разное время ложатся спать, чем просыпаются. То есть ты можешь предположить, что они просыпаются в 6, другие в 8, но если чекинг в 9.30, то, скорее всего, они все проснутся в 9.30. Со сном сложнее и труднее это представить. Как сделать так, чтобы это было не кринж? Не знаю.\n\nПотому что, видишь, я люблю уютные концы. И поэтому, когда ты случайно оказываешься где-то около костра с ещё четырьмя людьми, вы просто душевно пообщались. Good enough.\n\nЯ сама интуитивно ищу что-то такое, и я не знаю, как это можно было бы облечь в формат. Я думаю, что это как будто бы на ответственности каждого человека, и потому что я думаю, что еще не все, наверное, любят, что уютное в конце.\n\nМне кажется, что я бы точно по вечерам как раз ходила бы на ARG-шки Вани Белотелова. Я бы их как раз предпочла вечером, а не с утра.\n\n\nЯ знаю людей, которые считают, что эти штуки унылые. Есть такие люди, их какое-то количество. Присутствие там не обязательно.", "Люблю, когда она хорошо модерируется.\nМне кажется, модератору очень суперважная роль там.\nИ я люблю, конечно, штуки поразъёбнее.\nВся эта ваша деликатность и бережность, запихните её знаете куда.\nЯ отстаиваю разъёбность и глубину всей душой.\nТут есть, опять же, особенность в том, что точно не всем людям подходит, нужно ограничивать.\n\nКогда мы говорим про мой идеальный, мне, конечно, важно это делать с людьми, с которыми хочется это делать.\nЕсли это люди, с которыми мне не хочется сближаться, я сама не пойду в глубину просто осознанно.\n\nОт 6 до 12 людей.\nМне норм каждый день по два часа.", "Я встречусь с старыми всегда.", "Для души.", "Люди, с которыми... Ну, то есть, опять же, видишь, мы с Ваней созваниваемся раз в две недели, уже там с какой-то регулярностью, и это, ну, как бы, это важный мой контакт.\n\nМы очень близки с Яриком Русских и Аней Симоновой. Я к ним ездила в деревню, оставался несколько дней. Они, приезжая сюда, заходят на бранче. Это прям какая-то приятная тесность у нас с ними. Мне супер нравится.\n\nНу, как бы, есть у Максим и Лиза. Мы с ним иногда созваниваемся, если в Грузии мы с ними видимся, если Максим тоже в Грузии оказывается удачным образом. А Максим всегда удачным образом в Грузии оказывается.\n\nВ случае, Максима и Лизы, это строго разговоры с друзьями стали. То есть мы, не виделись до этого, мы не были на кэмпе вместе, это, мне кажется, разговоры с друзьями, как формат, который проходит вне кэмпа, оффлайн, аж такая онлайн штука, это супер объединяющая для всего сообщества вещь.\n\nВ случае с... Ваней это было то, что он приехал в Берлин, и мы с ним два раза увиделись, и там просто вот так вот шесть часов болтали, не останавливаясь.\n\nС Яриком и Аней это было, потому что они довольно часто приезжают в Берлин, и как-то просто они говорят, мы приехали, хотим в гости. Ну, то есть это... И они мне нравятся, вот это важно.\n\nПотому что есть люди, которые то же самое делают, но они мне не нравятся, и они у меня не в гостях.\n\nКрючком стала просто, мне кажется, взаимная симпатия.", "Если это фиксированная группа и все люди мне нравятся, то мне нравится фиксированная группа. Если люди мне не нравятся, мне нравится разнообразие.", "Сауну я воспринимаю только голыми. Ну, в смысле, я просто не пойду в сауну, в купальник это омерзительный, неприятно. Но я просто из Берлина.\n\nЧто касается бассейна, ну, то есть мне увидеть голых людей норм, я бы в этом участвовать не стала. Я бы ушла из бассейна.\nНу, потому что для меня это просто уже чуть-чуть too much, и это не про то, что эти люди делают что-то не так, это потому что... Неуместно. Не-не, это вполне уместно, просто это не про меня.\n\nЭто, в смысле, какая-то другая уместность, и я...\nНу, видишь, на самом деле я так говорю, я могу себе представить, чтобы такое было и мне норм, но это очень специфическая конфигурация должна быть, и я, скорее всего, в ней не окажусь.\n\nЕсли бы я, ты, Лиза, Антон были бы голыми в бассейне, у меня бы не было вопросов.\n\nА если к нам присоединяются чуваки, которые мне не нравятся, я их в одежде, блядь, видеть не хочу.", "Для меня, например, уже довольно интимной штукой является просто cuddle party, которая для меня чаще всего просто too much.\n\nИ я бы при условии, если мне нравится модератор, Паша попробовала бы пойти на cuddle party, например.\nИ это не голый формат, но он тоже уже сколько-то интимный.\nВот для того, чтобы саму себя в этой ситуации потестить, но...\n\nКак бы если формат такой, что у нас формат, мы все голые сидим в бассейне.\nЯ, ну как бы вне зависимости от модератора, туда бы не пошла, потому что это формат, который предполагает разнообразие людей.\nЯ не уверена, что у меня со всеми людьми там ок. Я понял.\n\nТо есть основной ключ это вот про то с кем.", "тот момент, когда ко мне подходит парень и на ушко шепчет подкат, который абсолютно неуместен, как мне кажется, для меня это не ок. Я могу сказать нет. Мне просто кажется, что он не очень считал атмосферу.\n\nИ тут какой-то вот такой момент, что, типа, когда идёт вначале, я не знаю, доклад про технофашизм, потом идёт творческий конкурс, а потом оргия, ты такой, а она тут откуда?\n\nЯ бы разделила интересы небольшого количества людей с их сексуальным теншеном и общую атмосферу кэмпа, которая на самом деле не сексуальная. И она может в ту сторону двигаться, для не очень большого количества людей, которые могут быть при этом очень громкими, и поэтому может создаваться ощущение, что всем с этим норм. Их на самом деле не очень много, мне кажется.\n\nЭто я про самую радикальную крайность. И дальше есть штуки в духе просто посидеть голыми вместе. Это тоже довольно интимно.\n\nИ дальше есть просто обниматься.\n\nЭто не тривиальная задача сказать «нет» человеку, с которым тебе потом ещё иметь дело какое угодно, когда он хочет тебя просто обнять. Потому что это никогда не безболезненное «нет». И поэтому мне сколько-то проще избегать таких вещей.\n\nИ для меня это большой и трудный вопрос про...\n\nЭто при том, что, опять же, я телесная, я люблю трогать и обнимать людей, которых я люблю. И совсем по-другому это воспринимается, когда это происходит с более трудными людьми.\n\nИ поэтому для меня то, где прилегает вот эта вот граница, она очень трудная, вот, потому что, видишь, я не знаю, я захочу обнять Никиту, я его обниму, его не спросив, и там не будет проблемы.\n\nА тут она может возникнуть просто потому, что, блин, не знаю, ко мне подходят мальчики, которые говорят, мне нравится. Вот, он проходит и подходит со светлыми глазами.\n\nДля меня это трудный вопрос, и я обычно, если честно, довольно легко адаптируюсь под правила, которые заявлены.\nПросто я бы сказала, что их довольно четко нужно обозначить заранее.", "Модерация мне не кажется, что нужна.\n\nЭто зеркало, об которое я вижу себя таким образом, как я нигде больше себя не вижу. Нет больше никакого такого зеркала, которое было бы сколько-нибудь приближенное к Aмп Кэмпу. Это очень специфическое качество людей, специфическое качество контакта между людьми, которое помогает тебе увидеть себя как-то иначе.", "В тот момент, когда тот, кто у вас занимается программой, скажет, а теперь мы запускаем программу, я срочно такая пишу, у меня есть идея для тренинга, мастер-класса, возьмите меня, пожалуйста.\n\nУ Хайдегера есть очаровательная диалектика осваивания и присваивания. Он говорил, это в случае земли, когда у тебя есть территория земли. Только тогда, когда ты ее начинаешь осваивать, что-то там сажать и так далее, она становится твоей, ты ее присваиваешь. И в тот момент, когда я начну что-то делать для майского кэмпа, он станет моим.\n\nКогда Энергия кэмповская заканчивается. Это происходит обычно через месяц, где-то, когда кэмп уже был. Ну, если когда у тебя уже другие дела, которые дают тебе больше сил. И когда, знаешь, у тебя есть еще обычно после кэмпа какие-то идеи. Если ты активно их как-то реализовываешь классами, но бывает, что ты перестаешь это делать, и вот кэмп закончился.", "", очные форматы\n\nночные активности - РАЗЪЕБ\n\nтуристические активности (например хайк).", "Есть перекос в сторону лекций.\n\nдлинные рассказы организаторов о том как они делали кемп.\n\nМожет ощущаться немного занудно.", "Да.\n\nПричины:\n\nиногда хочется просто слушать.\n\nнормальны форматы:\n\nклассный доклад\n\nсидеть на диванчике и слушать.\n\nВажно:\n\nне должно быть их засилья.\n\nесли все форматы активные — это ощущается как террор активности.", "Из ответа видно, что спонтанность важна.\n\nОна создаёт:\n\nощущение живости\n\nнеожиданные моменты.", "нет не нужны, только завершение кемпа", "Да, полезны.\n\nГлавный фактор:\n\nкто модерирует.\n\nПримеры хороших:\n\nформаты, которые ведёт Ваня\n\nформаты Вани и Никиты.", "примерно 50/50.\n\nНо важный инсайт:\n\nвремя еды — стратегическое.\n\nнужно осознанно выбирать, с кем сидеть, потому что таких возможностей немного.", "дружить\nчеловеческие связи важнее формальных.", "Конкретных людей не назвал.\n\nКрючок:\n\nличное взаимодействие / общение\n\nиногда кто-то пишет после кемпа.", "скорее перемешивание людей.\n\nПлюсы:\n\nкаждый раз новые разговоры и знакомства.\n\nФиксированные группы могут быть интересны, но:\n\nлучше короткими эпизодами.", "нет, могу только завидовать", "-", "каддлы - да супер, остальное не пробовал", "чат — это способ оставаться в контакте со знакомыми.\n\nощущение, что сообщество продолжается между кемпами.", "Кемп начинается уже в маршрутке по дороге.\n\nЧто там происходит:\n\nвеселье\n\nспонтанность\n\nмузыка\n\nкараоке\n\nнеожиданные активности от самих участников", "Основная ценность:\n\nнапитаться эмоциями и ощущениями\n\nпринятие\n\nширота переживаний.", "справедливая, дешевле вряд ли можно сделать, но это пока я хорошо зарабатываю", "ощущение, что комьюнити зафиксировалось в одной модели отбора.\n\nесть некоторая инерция и догмы.\n\nнужно больше новых вещей и экспериментов."]}], "questions": ["Q1. Если бы ты объяснял(а) человеку, который никогда не был: по каким признакам ты объяснишь, что это именно AmpCamp, а не просто выезд или мероприятие?", "Q2. Что может происходить на кемпе, но тебе всё равно — это не влияет на ощущение «кемп удался»?", "Q3. Вспомни один самый сильный момент — конкретный эпизод. Опиши, что было до, что происходило в моменте, что было после.", "Q4. Вспомни один конкретный момент, когда тебе было заметно не ок, разочаровало или было мимо вайба. Что произошло?", "Q5. Было ли ощущение «я не вписываюсь»? Если да — в какой момент и из-за чего?", "Q6. Представь один идеальный день кемпа. Составь его из блоков и расскажи, что и в каком порядке происходит.", "Q7. Про вечный конфликт соотношения форматов: что сейчас, по твоим ощущениям, перекошено?", "Q8. Нужны ли форматы, где участники пассивны, а не активны, например открытия или закрытия? Если да — чем они тебя привлекают?", "Q9. Хотелось бы тебе участвовать больше в спонтанных форматах, не закрепленных в программе? Или спонтанность плохо влияет на динамику?", "Q10. Нужны ли финальные точки дня? Каким должен быть финал, чтобы он был в тему, а не кринж?", "Q11. Считаешь ли ты полезными модерируемые форматы на сближение? Нравится ли тебе в них участвовать? Опиши идеальный для тебя формат сближения или его признаки.", "Q12. Во что ты больше вкладываешься: встречи со старыми друзьями или знакомство с новыми? Если бы пришлось выбрать одно — что важнее?", "Q13. Каких знакомств хочется больше: для души, для пользы или другое? Как ты отличаешь одно от другого по ощущениям или результату?", "Q14. Назови один–два человека, с кем ты поддерживаешь связь после кемпа. Что было общим крючком, который закрепил контакт?", "Q15. Тебе больше нравятся форматы сближения в фиксированных группах или когда люди перемешиваются? В чём ты видишь плюсы и минусы фиксированных групп? Было ли желание сменить группу?", "Q16. Вызывают ли у тебя негативные эмоции шумные, алкогольные или голые форматы? Какой негативный эффект они дают, если дают?", "Q17. Как такие форматы можно было бы проводить для желающих, чтобы они не вызывали у тебя негативных эмоций и чтобы разные группы могли сосуществовать?", "Q18. Телесная близость, обнимашки, каддлы и интимные форматы: что для тебя ок или не ок и где проходят границы?", "Q19. Какую ценность для тебя несет комьюнити и или чат между кемпами? Требуется ли там больше или меньше модерации?", "Q20. Когда ты чувствуешь, что кемп для тебя начался? Что является спусковым крючком для начала кемпа и что является его окончанием?", "Q21. Когда ты принимал(а) решение ехать в последний раз, какую ценность ты ожидал(а) получить? После кемпа что совпало, а что нет?", "Q22. Как ты оцениваешь цену: справедливо, скорее дорого или точно дорого? Почему?", "Q23. Что, на твой взгляд, может сделать кемпы лучше?"]};

let currentMode = 'person';
let selectedPerson = null;
let selectedQuestion = null;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  selectedPerson = null;
  selectedQuestion = null;
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  
  if (currentMode === 'person') {
    const sorted = [...DATA.campers].sort((a, b) => a.id - b.id);
    sb.innerHTML = `
      <div class="sidebar-label" style="padding-top:12px">Участники</div>
      ${sorted.map(c => {
        const count = c.answers.filter(x => x.trim()).length;
        if (count === 0) return '';
        return '<div class="sidebar-item ' + (selectedPerson === c.id ? 'active' : '') + '" onclick="selectPerson(' + c.id + ')">' +
          '<span class="id-badge">#' + c.id + '</span>' +
          '<span class="answer-count">' + count + ' отв.</span>' +
        '</div>';
      }).join('')}
    `;
  } else {
    sb.innerHTML = `
      <div class="sidebar-label" style="padding-top:12px">Вопросы</div>
      ${DATA.questions.map((q, i) => {
        const num = q.match(/Q\d+/)?.[0] || 'Q'+(i+1);
        const answeredCount = DATA.campers.filter(c => c.answers[i] && c.answers[i].trim()).length;
        return '<div class="sidebar-item ' + (selectedQuestion === i ? 'active' : '') + '" onclick="selectQuestion(' + i + ')">' +
          '<span class="id-badge">' + num + '</span>' +
          '<span style="font-size:12px;line-height:1.3;color:var(--text-dim)">' + q.replace(/Q\d+\.\s*/, '').substring(0, 42) + '…</span>' +
          '<span class="answer-count">' + answeredCount + '</span>' +
        '</div>';
      }).join('')}
    `;
  }
}

function selectPerson(id) {
  selectedPerson = id;
  renderSidebar();
  renderMain();
}

function selectQuestion(idx) {
  selectedQuestion = idx;
  renderSidebar();
  renderMain();
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function renderMain() {
  const main = document.getElementById('main');
  
  if (currentMode === 'person') {
    if (selectedPerson === null) {
      main.innerHTML = '<div class="empty-state"><div class="arrow">←</div>Выберите участника слева</div>';
      return;
    }
    const camper = DATA.campers.find(c => c.id === selectedPerson);
    const count = camper.answers.filter(x => x.trim()).length;
    
    main.innerHTML =
      '<div class="main-title">Респондент #' + camper.id + '</div>' +
      '<div class="main-meta">' + count + ' из ' + DATA.questions.length + ' ответов</div>' +
      DATA.questions.map((q, i) => {
        const num = q.match(/Q\d+/)?.[0] || 'Q'+(i+1);
        const qText = q.replace(/Q\d+\.\s*/, '');
        const answer = camper.answers[i] || '';
        const isEmpty = !answer.trim();
        return '<div class="qa-card">' +
          '<div class="question"><span class="q-num">' + num + '</span>' + esc(qText) + '</div>' +
          '<div class="answer ' + (isEmpty ? 'empty' : '') + '">' + (isEmpty ? '— нет ответа —' : esc(answer)) + '</div>' +
        '</div>';
      }).join('');
  } else {
    if (selectedQuestion === null) {
      main.innerHTML = '<div class="empty-state"><div class="arrow">←</div>Выберите вопрос слева</div>';
      return;
    }
    const q = DATA.questions[selectedQuestion];
    const num = q.match(/Q\d+/)?.[0] || 'Q'+(selectedQuestion+1);
    const qText = q.replace(/Q\d+\.\s*/, '');
    const answered = DATA.campers.filter(c => c.answers[selectedQuestion] && c.answers[selectedQuestion].trim());
    
    main.innerHTML =
      '<div class="main-title"><span style="color:var(--accent-dim);font-family:JetBrains Mono,monospace;font-size:16px;margin-right:10px">' + num + '</span>' + esc(qText) + '</div>' +
      '<div class="main-meta">' + answered.length + ' ответов из ' + DATA.campers.length + '</div>' +
      answered.map(c =>
        '<div class="respondent-answer">' +
          '<div class="resp-label">#' + c.id + '</div>' +
          '<div class="resp-text">' + esc(c.answers[selectedQuestion]) + '</div>' +
        '</div>'
      ).join('');
  }
  
  main.scrollTop = 0;
}

renderSidebar();
</script>
