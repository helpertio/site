<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmpCamp · CampDev Interviews</title>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eceae4;
    --border: #ddd9d0;
    --border-active: #bbb6aa;
    --text: #2c2a26;
    --text-dim: #6b6760;
    --text-muted: #9e998f;
    --accent: #b37a2b;
    --accent-dim: #9a6820;
    --accent-glow: rgba(179, 122, 43, 0.07);
    --q-bg: #eeece6;
    --answer-bg: #fafaf8;
    --radius: 6px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Literata', Georgia, serif;
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
  }
  .header {
    padding: 28px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
    background: var(--surface);
  }
  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .header .subtitle { font-size: 13px; color: var(--text-dim); }
  .mode-tabs {
    display: flex;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .mode-tab {
    padding: 14px 24px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }
  .mode-tab:hover { color: var(--text); }
  .mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .container { display: flex; min-height: calc(100vh - 110px); }

  .sidebar {
    width: 220px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    padding: 16px 0;
    overflow-y: auto;
    background: var(--surface);
    transition: width 0.2s, min-width 0.2s;
  }
  .sidebar.wide { width: 360px; min-width: 360px; }
  .sidebar-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 4px 20px 10px;
  }
  .sidebar-item {
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
    border-left: 2px solid transparent;
  }
  .sidebar-item:hover { background: var(--surface2); }
  .sidebar-item.active { background: var(--accent-glow); border-left-color: var(--accent); }
  .sidebar-item .id-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    min-width: 28px;
    flex-shrink: 0;
  }
  .sidebar-item.active .id-badge { color: var(--accent); font-weight: 500; }
  .sidebar-item .cohort-label {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-item .answer-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .sidebar-item .q-text { font-size: 13px; line-height: 1.4; color: var(--text-dim); }
  .sidebar-item.active .q-text { color: var(--text); }

  .main {
    flex: 1;
    padding: 28px 40px 60px;
    overflow-y: auto;
    max-width: 920px;
  }
  .main-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .main-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .cohort-filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .cohort-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .cohort-btn:hover { border-color: var(--border-active); color: var(--text); }
  .cohort-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .qa-card {
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }
  .qa-card:hover { border-color: var(--border-active); }
  .qa-card .question {
    padding: 12px 18px;
    background: var(--q-bg);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.55;
  }
  .qa-card .question .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent-dim);
    margin-right: 8px;
  }
  .qa-card .answer {
    padding: 14px 18px;
    background: var(--answer-bg);
    white-space: pre-wrap;
    font-size: 15px;
    line-height: 1.7;
  }
  .qa-card .answer.empty { color: var(--text-muted); font-style: italic; font-size: 13px; }

  .respondent-answer {
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
  }
  .respondent-answer .resp-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent-dim);
    margin-bottom: 6px;
  }
  .respondent-answer .resp-label .resp-cohort {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 6px;
  }
  .respondent-answer .resp-text { white-space: pre-wrap; font-size: 14px; line-height: 1.65; }

  .empty-state { color: var(--text-muted); text-align: center; padding: 80px 20px; font-size: 15px; }
  .empty-state .arrow { font-size: 32px; margin-bottom: 12px; opacity: 0.3; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .container { flex-direction: column; }
    .sidebar, .sidebar.wide { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
    .main { padding: 20px; }
    .header { padding: 20px; }
    .mode-tabs { padding: 0 20px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>AmpCamp</h1>
  <span class="subtitle" id="subtitle"></span>
</div>

<div class="mode-tabs" id="modeTabs"></div>

<div class="container">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main">
    <div class="empty-state"><div class="arrow">←</div>Выберите участника слева</div>
  </div>
</div>

<script>
var DATA = JSON.parse('{"campers": [{"id": 1, "cohort": "постоянные", "answers": ["Основные признаки кэмпа:\\n\\nВстреча с интересными и очень разными людьми\\nРазнообразие людей на кэмпе значительно шире, чем в обычной жизни.\\n\\nНаличие структуры (программы)\\nПрограмма создаёт рамку, которая вызывает любопытство и направляет взаимодействие.\\n\\nДетач от повседневной жизни\\nКэмп — это временное погружение в другой контекст, где можно попробовать новое, пережить необычные ощущения и поэкспериментировать.\\n\\nПри этом со временем появляется ощущение, что самые интересные вещи происходят между форматами, в неформальном общении.", "2. Можно ли ломать какие-то элементы\\n\\nПолностью убрать программу можно, но:\\n\\nона создаёт структуру и снижает трения между участниками\\n\\nпомогает организовать взаимодействие\\n\\nделает опыт более устойчивым\\n\\nБез программы люди всё равно будут создавать активности, но:\\n\\nони будут более хаотичными\\n\\nможет возникать больше конфликтов или трений\\n\\nПоэтому программа полезна, хотя иногда её бывает слишком много.\\n\\n3. Перегруз программы\\n\\nНаблюдение:\\n\\nк концу кемпа накапливается усталость и недосып\\n\\nиз-за этого падает энергия и вовлечённость\\n\\nПоэтому иногда хочется:\\n\\nменьше форматов\\n\\nбольше пространства для сна и общения.\\n\\n4. Что не влияет на ощущение удачного кэмпа\\n\\nМало влияет:\\n\\nУсловия проживания\\n\\nНапример:\\n\\nюрты\\n\\nпростые базы\\n\\nхолод\\n\\nнеидеальный комфорт\\n\\nЭто воспринимается нормально и не влияет на ценность события.\\n\\nЧто действительно важно\\n\\nЕсли бы что-то и могло испортить опыт, то скорее:\\n\\nсильная грязь\\n\\nнеприятные бытовые условия\\n\\nНо умеренная простота не является проблемой.\\n\\n5. Что не нравится в организации\\n\\nОсновная проблема — логистика.\\n\\nПоездка занимает много времени:\\n\\nперелёты\\n\\nтрансферы\\n\\nудалённость базы\\n\\nХотелось бы, чтобы база была ближе к аэропорту, чтобы меньше времени тратить на дорогу и больше на общение.", "1. Неожиданное узнавание\\n\\nМомент, когда оказалось, что многие люди его знают, хотя он их уже не помнит. Это создаёт ощущение связности сообщества.\\n\\n2. Лекция Димы Беззубцева про архитектуру\\n\\nЭффект «вау»:\\n\\nвнимание к деталям\\n\\nнеожиданные наблюдения\\n\\nспособность увидеть привычные вещи иначе.\\n\\n3. Ролевая игра\\n\\nФормат позволил:\\n\\nбыстро погрузиться в другую атмосферу\\n\\nпримерить другую роль\\n\\nпрожить архетипический опыт\\n\\nЭто создало сильное эмоциональное переживание.", "Явно негативных форматов почти не было.\\n\\nБыли форматы:\\n\\nкоторые меньше резонировали\\n\\nно не вызывали сильного отторжения.\\n\\nОдин спорный момент\\n\\nФотографии с обнажёнными участниками, опубликованные фотографом в сторис.\\n\\nПроблема:\\n\\nне было уверенности, что все участники дали согласие на публикацию\\n\\nЭто вызвало этическое сомнение, но ситуация не получила развития.", "Кэмп воспринимается как групповая динамика.\\n\\nВ начале:\\n\\nучастники пробуют взаимодействовать\\n\\nсмотрят, где возникает контакт.\\n\\nКо второму–третьему дню:\\n\\nначинают формироваться связи\\n\\nпоявляется глубокое общение.\\n\\nСамые сильные моменты:\\n\\nночные разговоры\\n\\nнеожиданные контакты\\n\\nчувство, что хочется продолжать общение, несмотря на усталость.", "Конкретного представления нет, но есть пожелания относительно отдельных моментов: Специально закладывать свободное время не обязательно.\\n\\nЛюди сами:\\n\\nнаходят возможность не идти на форматы\\n\\nсоздают пространство для общения.\\n\\nНо программу можно сделать чуть более расслабленной.\\n\\n10. Количество параллельных форматов\\n\\nОптимально:\\n\\n2 параллельных трека\\n\\nПри трёх возникает проблема:\\n\\nхочется попасть сразу в несколько мест\\n\\nчасть интересных форматов пропускается.", "Есть ощущение, что со временем форматы стали:\\n\\nменьше научно-популярными\\nи больше личными рассказами.\\n\\nПри этом есть два удачных типа форматов.\\n\\n1. Сильный сторителлинг\\n\\nНапример:\\n\\nрассказы о путешествиях\\n\\nэкспедициях\\n\\nнеобычном опыте.\\n\\nЗдесь не нужна применимость — важна история.\\n\\n2. Личный опыт + применимость\\n\\nКогда:\\n\\nчеловек рассказывает свой опыт\\n\\nно добавляет исследования, выводы, рекомендации.\\n\\nЭто делает формат более ценным для других.\\n\\nПроблемный формат\\n\\nКогда выступление:\\n\\nне является сильной историей\\n\\nи не даёт применимых выводов.\\n\\nТогда возникает ощущение, что формат «повисает».", "Форматы вроде открытия и закрытия нужны.\\n\\nНо они должны быть не пассивными, а ритуальными.\\n\\nПример:\\n\\nсвеча\\n\\nсовместные действия\\n\\nпроживание ритуала всей группой.\\n\\nТакже полезно:\\n\\nотдельное закрытие для участников\\n\\nотдельное закрытие для команды.", "Спонтанность важна, но пусть она возникает сама в программе", "Да, но это должны быть какие-то ритуалы", "Модерируемые форматы знакомства очень полезны.\\n\\nПричины:\\n\\nпомогают интровертам\\n\\nдают возможность для более глубоких разговоров\\n\\nсоздают пространство для контакта, которого иначе могло бы не случиться.", "Приоритет — новые контакты.\\n\\nПричины:\\n\\nсо старыми друзьями можно пообщаться и в обычной жизни\\n\\nкэмп даёт возможность познакомиться с новыми людьми.", "Для души", "Сонч", "Важно, когда люди имеют возможность перемешиваться", "Отношение нейтральное:\\n\\nдля кого-то это подходит\\n\\nдля кого-то нет.\\n\\nНапример, бассейн-вечеринка с алкоголем:\\n\\nне была его форматом\\n\\nно он не считает, что её нужно запрещать.\\n\\nЛучшее решение — параллельные альтернативные активности.", "Через создание параллельных активностей", "Не вызывают отторжения, но понимает, что подходят эти форматы не всем", "Комьюнити важно, потому что помогает сохранять динамику группы", "Начало:\\nс момента выезда из дома.\\n\\nОкончание:\\nкогда он возвращается домой и делится опытом с супругой.", "-", "Справедливо", "1. Отбор участников\\n\\nЕсть ощущение, что:\\n\\nкритерии отбора не всегда прозрачны\\n\\nнекоторые сильные кандидаты не попадают\\n\\nа некоторые участники кажутся менее подходящими.\\n\\n2. Социальная динамика группы\\n\\nНа ранних кэмпах было больше людей, которые:\\n\\nхорошо чувствовали состояние группы\\n\\nмогли поддерживать участников\\n\\nпомогали сглаживать напряжение.\\n\\nЭто создавало более тёплую и целостную атмосферу."]}, {"id": 2, "cohort": "постоянные", "answers": ["Самое точное описание кэмпа — это ситуация, когда:\\n\\n«Если позвать своих лучших друзей, а они позовут своих лучших друзей, и всех собрать в одном месте».\\n\\nТогда возникает особое чувство:\\n\\nбудто мы всегда были знакомы, но познакомились только сегодня.\\n\\nКэмп создаёт редкое пространство, где:\\n\\nмного разных, но близких по духу людей\\n\\nбыстро возникает ощущение связности\\n\\nобщение происходит легко и глубоко.\\n\\nТакое ощущение сложно воспроизвести в обычной жизни.", "наименее ценная часть программы — это сухие профессиональные доклады.\\n\\nНапример:\\n\\nпрезентации карьерных достижений\\n\\nрассказы о бизнес-успехе\\n\\nдемонстрация эффективности и роста\\n\\nТакие форматы воспринимаются как:\\n\\nкорпоративные презентации\\n\\nэлементы профессионального соревнования.\\n\\nРаньше их было значительно больше, и это приводило к эффекту:\\n\\nусиления синдрома самозванца\\n\\nощущения негласной конкуренции.\\n\\nСо временем на кэмпах стало меньше таких форматов, что воспринимается как положительное изменение.", "Самые сильные моменты связаны не столько с форматами, сколько с эмоциональными точками напряжения и разрешения.\\n\\n1. Конфликт → разрешение\\n\\nИногда на кэмпе возникает:\\n\\nнапряжение\\n\\nконфликт\\n\\nнедопонимание.\\n\\nНо если затем происходит открытый разговор или выговаривание, возникает очень сильный эффект:\\n\\nлюди выговариваются\\n\\nнапряжение уходит\\n\\nвозникает чувство близости.\\n\\nПосле этого появляется ощущение тепла, которое может сохраняться месяцами после кэмпа.\\n\\n2. Возможность сказать что-то важное и рискованное\\n\\nОчень сильные моменты возникают, когда человек:\\n\\nговорит что-то, что ему страшно говорить\\n\\nно это оказывается принятым группой.\\n\\nТакой опыт может стать эмоционально одним из самых мощных на кэмпе.\\n\\n4. Магия обратной связи\\n\\nОдна из самых сильных практик — когда люди лично говорят друг другу, чем они ценны.\\n\\nЭто может происходить, например:\\n\\nпосле общего шеринга\\n\\nв формате личных разговоров.\\n\\nКогда человеку прямо говорят, за что его ценят, это создаёт эффект, который:\\n\\nостаётся в памяти надолго\\n\\nформирует ощущение глубокой связи.\\n\\n5. Почему стоит менять форму, но не идею\\n\\nРаньше на кэмпах использовались разные артефакты признания (например, ленточки).\\n\\nНо у них есть проблема:\\n\\nих можно пересчитать\\n\\nвозникает ощущение сравнения и конкуренции.\\n\\nПоэтому идея признания важна, но форму стоит менять, чтобы:\\n\\nизбежать сравнения\\n\\nсохранить элемент неожиданности\\n\\nсделать взаимодействие более личным.\\n\\nЛичное признание всегда сильнее, чем символический артефакт.\\n\\n6. Неожиданные сильные моменты\\n\\nИногда самые сильные моменты возникают между форматами.\\n\\nПример — поездка на автобусе после кэмпа.\\n\\nЭтот момент особенно ценен потому что:\\n\\nпоявляется «бонусное время»\\n\\nлюди понимают, что скоро разъедутся\\n\\nвозникает желание поговорить со всеми, с кем не успел.\\n\\nВ этот момент происходят очень глубокие и неожиданные разговоры.\\n\\n7. Эмоциональный хвост кэмпа\\n\\nКэмп не заканчивается вместе с программой.\\n\\nПосле него возникает длительный эмоциональный шлейф:\\n\\nпервые вечера после возвращения в город\\n\\nвоспоминания\\n\\nощущение близости с людьми.\\n\\nВладимир сравнивает это с температурой моря:\\n\\nлето уже закончилось, но вода остаётся тёплой.\\n\\nТак же и кэмп продолжает жить в переживаниях после окончания.", "Не было такого", "Нет, все кемпы психологичны для меня", "Программа кэмпа в целом уже устоялась:\\n\\nзарядка\\n\\nзавтрак\\n\\nпервый блок форматов\\n\\nпрогулка\\n\\nобед\\n\\nвторой блок форматов\\n\\nвечерняя часть.\\n\\nПри этом, по мнению Владимира, кэмпу не хватает музыкальных вечеров, потому что:\\n\\nмногие участники умеют петь\\n\\nсовместная музыка создаёт особую атмосферу.", "Очень важным фактором является сама база проведения.\\n\\nЕсли пространство:\\n\\nкомпактное\\n\\nлюди часто пересекаются\\n\\nесть уютные места для разговоров,\\n\\nто возникает самоподдерживающаяся социальная реакция.\\n\\nНапример:\\n\\nдиваны\\n\\nнебольшие комнаты\\n\\nместа для случайных встреч.\\n\\nВ таких условиях разговоры возникают постоянно.\\n\\nЕсли пространство слишком большое, люди рассеиваются, и общение ослабевает.Кэмп должен оставаться интенсивным.\\n\\nЕсли в программе слишком много свободного времени, появляется ощущение:\\n\\nпустоты\\n\\nупущенных возможностей.\\n\\nНебольшие паузы полезны, но ядро программы должно быть насыщенным.Важно, чтобы в программе было как минимум два параллельных потока.\\n\\nЭто создаёт:\\n\\nощущение богатства выбора\\n\\nдинамику перемещения между форматами. \\nсближающие форматы должны занимать значительную часть программы\\n\\nвозможно до третьей части всех активностей.\\n\\nЕсли их становится меньше, возникает ощущение, что теряется душа кэмпа.", "-", "Спонтанные форматы — очень важная часть кэмпа.\\n\\nИменно они часто становятся:\\n\\nсамыми живыми\\n\\nсамыми запоминающимися.\\n\\nБольшинство сильных моментов на кэмпах возникают именно спонтанно.", "Здорово, когда они возникают самы из социальной динамики", "Модерируемые форматы знакомства очень полезны.\\n\\nЕсли их нет:\\n\\nмногие люди так и не узнают друг друга\\n\\nвозникает хаотичное общение.\\n\\nФормат вроде «свечки» (когда люди по кругу рассказывают о себе) помогает:\\n\\nуслышать каждого\\n\\nсоздать старт для общения.", "Старается познакомиться как с можно большим количеством людей", "-", "-", "Форматы сближения в маленьких группах тоже ценны.\\n\\nНапример:\\n\\nмастермайнд\\n\\nразговоры о личных проблемах. тому проще отношусь, типа, мне норм что-то упустить, если мне нужно свободное время, я просто положу хуй на формат. У меня, конечно, отношение к этому такое, что кэмп, скорее, должен быть плотный по содержанию, потому что я не за это плачу деньги, чтобы отдыхать. Я отдыхать и сам не могу, будто бы хочется наоборот. Но тебе хуже, мне кажется, это не когда ты захотел отдохнуть, а там что-то интересное, а наоборот, когда ты захотел посмотреть что-то интересное, там ничего нету. Вот это вот хуже, мне кажется.\\n\\n- Я обычно просыпаюсь в 7 утра, значит, до 8.30 нет ничего.\\n- Ну, собственно, происходящего, потому что хочется заземлить, прийти в себя.\\n- И потом начинается что-то... какой-то реально чекин, кто-то, кто мне говорит про то, что будет происходить весь день, и понимание, чтобы у меня было расписание перед глазами.\\n- Вкусный, охуенный завтрак, в котором нет овсянки, и сбольшим количеством яиц.\\n- И дальше мне нравится с утра иметь всё, что угодно, околоинтеллектуальное, максимально сложное, из того, что можно процессить, самое сложное иметь с утра, как можно больше.\\n- Дальше чил на солнышке, футбол с пацанами, дальше какие-нибудь приятные активности на свежем воздухе. Это, может быть, театральные штуки.\\n- О, мне кажется, то, чего не хватает на кэмпе, это вот что-нибудь смешное, в смысле, что нацелено на это, чтобы делать смешно.\\n- Потом какие-нибудь доклады про праздники, про какие-то... В общем, что-то, что... Не доклады, а эти... какое-то околотворческое.\\n- Дальше вечер, вы все объединяетесь на каком-то концерте самодеятельности, что угодно такое.\\n- И дальше вкусный ужин с большой уткой.\\n- И дальше уже кто что хочет, а я спать.", "Да, смешное, я тут очень добавила, но, кстати, я, видишь, поскольку не была на последнем кемпе, я не знаю, как выглядел спост там, но, насколько я знаю, предыдущие два кемпа, типа сербский и турецкий, это были довольно нетипичные кемпы, потому что на них было не очень много докладов, поэтому сказать, что перекос есть в сторону докладов, я не уверена, что это так. Вот, да, и вот мне хочется каких-то активностей, которые не через вербальное объединяют людей, вот.", "Вот, ну, ты сказала про смешное, про... Да, смешно, я тут очень добавила, но, кстати, я, видишь, поскольку не была на последнем кемпе, я не знаю, как выглядел спост там, но, насколько я знаю, предыдущие два кемпа, типа сербский и турецкий, это были довольно нетипичные кемпы, потому что на них было не очень много докладов, поэтому сказать, что перекос есть в сторону докладов, я не уверена, что это так. Вот, да, и вот мне хочется каких-то активностей, которые не через вербальное объединяют людей, вот.", "Я не думаю, что это можно и нужно контролировать, потому что если спонтанное что-то будет происходить, оно произойдет. Потому что все на кемпе происходит добровольно. Если люди хотят объединиться, что-то сделать. Они объединяются, что-то сделают.\\n\\nУ нас, например, был замечательный спонтанный диванчик про секс. Топ прошёл. Один из лучших.\\n\\nНо тут есть сложность. Я помню, что я читала в анонимном чате, что на чей-то формат, который запланирован, люди не пришли, потому что пошли на какой-то спонтанный поход, по-моему.\\n\\nЯ точно не хотела бы быть человеком, который стоит один в аудитории, подготовивший что-то, к которому, кому никто не пришёл.\\nИ вообще, мне кажется, самая сложная и болезненная штука – это организовывать форматы таким образом, чтобы хотя бы пару людей туда пришли.\\nВот это вот точно не то, что должно страдать, просто из уважения к готовящимся.\\nВсё остальное вообще похуй.\\n\\nТочно спонтанность — это супер. И нужно тогда точно проявить заботу к запланированному.", "Мне кажется, чекауты дня – это сложнее штука, потому что люди скорее в разное время ложатся спать, чем просыпаются. То есть ты можешь предположить, что они просыпаются в 6, другие в 8, но если чекинг в 9.30, то, скорее всего, они все проснутся в 9.30. Со сном сложнее и труднее это представить. Как сделать так, чтобы это было не кринж? Не знаю.\\n\\nПотому что, видишь, я люблю уютные концы. И поэтому, когда ты случайно оказываешься где-то около костра с ещё четырьмя людьми, вы просто душевно пообщались. Good enough.\\n\\nЯ сама интуитивно ищу что-то такое, и я не знаю, как это можно было бы облечь в формат. Я думаю, что это как будто бы на ответственности каждого человека, и потому что я думаю, что еще не все, наверное, любят, что уютное в конце.\\n\\nМне кажется, что я бы точно по вечерам как раз ходила бы на ARG-шки Вани Белотелова. Я бы их как раз предпочла вечером, а не с утра.\\n\\n\\nЯ знаю людей, которые считают, что эти штуки унылые. Есть такие люди, их какое-то количество. Присутствие там не обязательно.", "Люблю, когда она хорошо модерируется.\\nМне кажется, модератору очень суперважная роль там.\\nИ я люблю, конечно, штуки поразъёбнее.\\nВся эта ваша деликатность и бережность, запихните её знаете куда.\\nЯ отстаиваю разъёбность и глубину всей душой.\\nТут есть, опять же, особенность в том, что точно не всем людям подходит, нужно ограничивать.\\n\\nКогда мы говорим про мой идеальный, мне, конечно, важно это делать с людьми, с которыми хочется это делать.\\nЕсли это люди, с которыми мне не хочется сближаться, я сама не пойду в глубину просто осознанно.\\n\\nОт 6 до 12 людей.\\nМне норм каждый день по два часа.", "Я встречусь с старыми всегда.", "Для души.", "Люди, с которыми... Ну, то есть, опять же, видишь, мы с Ваней созваниваемся раз в две недели, уже там с какой-то регулярностью, и это, ну, как бы, это важный мой контакт.\\n\\nМы очень близки с Яриком Русских и Аней Симоновой. Я к ним ездила в деревню, оставался несколько дней. Они, приезжая сюда, заходят на бранче. Это прям какая-то приятная тесность у нас с ними. Мне супер нравится.\\n\\nНу, как бы, есть у Максим и Лиза. Мы с ним иногда созваниваемся, если в Грузии мы с ними видимся, если Максим тоже в Грузии оказывается удачным образом. А Максим всегда удачным образом в Грузии оказывается.\\n\\nВ случае, Максима и Лизы, это строго разговоры с друзьями стали. То есть мы, не виделись до этого, мы не были на кэмпе вместе, это, мне кажется, разговоры с друзьями, как формат, который проходит вне кэмпа, оффлайн, аж такая онлайн штука, это супер объединяющая для всего сообщества вещь.\\n\\nВ случае с... Ваней это было то, что он приехал в Берлин, и мы с ним два раза увиделись, и там просто вот так вот шесть часов болтали, не останавливаясь.\\n\\nС Яриком и Аней это было, потому что они довольно часто приезжают в Берлин, и как-то просто они говорят, мы приехали, хотим в гости. Ну, то есть это... И они мне нравятся, вот это важно.\\n\\nПотому что есть люди, которые то же самое делают, но они мне не нравятся, и они у меня не в гостях.\\n\\nКрючком стала просто, мне кажется, взаимная симпатия.", "Если это фиксированная группа и все люди мне нравятся, то мне нравится фиксированная группа. Если люди мне не нравятся, мне нравится разнообразие.", "Сауну я воспринимаю только голыми. Ну, в смысле, я просто не пойду в сауну, в купальник это омерзительный, неприятно. Но я просто из Берлина.\\n\\nЧто касается бассейна, ну, то есть мне увидеть голых людей норм, я бы в этом участвовать не стала. Я бы ушла из бассейна.\\nНу, потому что для меня это просто уже чуть-чуть too much, и это не про то, что эти люди делают что-то не так, это потому что... Неуместно. Не-не, это вполне уместно, просто это не про меня.\\n\\nЭто, в смысле, какая-то другая уместность, и я...\\nНу, видишь, на самом деле я так говорю, я могу себе представить, чтобы такое было и мне норм, но это очень специфическая конфигурация должна быть, и я, скорее всего, в ней не окажусь.\\n\\nЕсли бы я, ты, Лиза, Антон были бы голыми в бассейне, у меня бы не было вопросов.\\n\\nА если к нам присоединяются чуваки, которые мне не нравятся, я их в одежде, блядь, видеть не хочу.", "Для меня, например, уже довольно интимной штукой является просто cuddle party, которая для меня чаще всего просто too much.\\n\\nИ я бы при условии, если мне нравится модератор, Паша попробовала бы пойти на cuddle party, например.\\nИ это не голый формат, но он тоже уже сколько-то интимный.\\nВот для того, чтобы саму себя в этой ситуации потестить, но...\\n\\nКак бы если формат такой, что у нас формат, мы все голые сидим в бассейне.\\nЯ, ну как бы вне зависимости от модератора, туда бы не пошла, потому что это формат, который предполагает разнообразие людей.\\nЯ не уверена, что у меня со всеми людьми там ок. Я понял.\\n\\nТо есть основной ключ это вот про то с кем.", "тот момент, когда ко мне подходит парень и на ушко шепчет подкат, который абсолютно неуместен, как мне кажется, для меня это не ок. Я могу сказать нет. Мне просто кажется, что он не очень считал атмосферу.\\n\\nИ тут какой-то вот такой момент, что, типа, когда идёт вначале, я не знаю, доклад про технофашизм, потом идёт творческий конкурс, а потом оргия, ты такой, а она тут откуда?\\n\\nЯ бы разделила интересы небольшого количества людей с их сексуальным теншеном и общую атмосферу кэмпа, которая на самом деле не сексуальная. И она может в ту сторону двигаться, для не очень большого количества людей, которые могут быть при этом очень громкими, и поэтому может создаваться ощущение, что всем с этим норм. Их на самом деле не очень много, мне кажется.\\n\\nЭто я про самую радикальную крайность. И дальше есть штуки в духе просто посидеть голыми вместе. Это тоже довольно интимно.\\n\\nИ дальше есть просто обниматься.\\n\\nЭто не тривиальная задача сказать «нет» человеку, с которым тебе потом ещё иметь дело какое угодно, когда он хочет тебя просто обнять. Потому что это никогда не безболезненное «нет». И поэтому мне сколько-то проще избегать таких вещей.\\n\\nИ для меня это большой и трудный вопрос про...\\n\\nЭто при том, что, опять же, я телесная, я люблю трогать и обнимать людей, которых я люблю. И совсем по-другому это воспринимается, когда это происходит с более трудными людьми.\\n\\nИ поэтому для меня то, где прилегает вот эта вот граница, она очень трудная, вот, потому что, видишь, я не знаю, я захочу обнять Никиту, я его обниму, его не спросив, и там не будет проблемы.\\n\\nА тут она может возникнуть просто потому, что, блин, не знаю, ко мне подходят мальчики, которые говорят, мне нравится. Вот, он проходит и подходит со светлыми глазами.\\n\\nДля меня это трудный вопрос, и я обычно, если честно, довольно легко адаптируюсь под правила, которые заявлены.\\nПросто я бы сказала, что их довольно четко нужно обозначить заранее.", "Модерация мне не кажется, что нужна.\\n\\nЭто зеркало, об которое я вижу себя таким образом, как я нигде больше себя не вижу. Нет больше никакого такого зеркала, которое было бы сколько-нибудь приближенное к Aмп Кэмпу. Это очень специфическое качество людей, специфическое качество контакта между людьми, которое помогает тебе увидеть себя как-то иначе.", "В тот момент, когда тот, кто у вас занимается программой, скажет, а теперь мы запускаем программу, я срочно такая пишу, у меня есть идея для тренинга, мастер-класса, возьмите меня, пожалуйста.\\n\\nУ Хайдегера есть очаровательная диалектика осваивания и присваивания. Он говорил, это в случае земли, когда у тебя есть территория земли. Только тогда, когда ты ее начинаешь осваивать, что-то там сажать и так далее, она становится твоей, ты ее присваиваешь. И в тот момент, когда я начну что-то делать для майского кэмпа, он станет моим.\\n\\nКогда Энергия кэмповская заканчивается. Это происходит обычно через месяц, где-то, когда кэмп уже был. Ну, если когда у тебя уже другие дела, которые дают тебе больше сил. И когда, знаешь, у тебя есть еще обычно после кэмпа какие-то идеи. Если ты активно их как-то реализовываешь классами, но бывает, что ты перестаешь это делать, и вот кэмп закончился.", "", "Я считаю, что кэмп очень сильно дорогой. Это пиздец, насколько он дорогой. Готова ли я платить эти деньги? Да каждый раз я плачу эти деньги. И это какая-то штука, которая точно является частью моих привилегий.\\n\\nПри этом, если бы у меня не было сейвинг, заплатить за КЭМ было бы и для встречи всего сообщества 42:19", "Первый Кэмп был перекошен в сторону интеллектуальных активностей 32:10\\nНа последнем Кэмпе не хватило интеллектуального контента, многие форматы не удались 33:00\\nИнтеллектуальные форматы должны быть эмоционально ангажирующими, а не только сложными 34:19\\nПерекос в сторону форматов на сближение приветствуется, так как люди выбирают нужные им активности 34:48", "Пассивные форматы необходимы для баланса и отдыха участников 38:04\\nЛекции могут быть опционально интерактивными, но должны позволять пассивное участие 38:21\\nПассивные форматы ассоциируются с утренним временем, когда нет энергии для активного участия 39:02", "Спонтанные активности содержат магию Кэмпа и должны поощряться 40:35\\nЛучшие моменты на Кэмпе часто возникают спонтанно: обсуждения, диванчики, походы 40:17\\nОрганизаторы должны создавать среду, где спонтанные инициативы участников приветствуются 40:35", "Предфинальная точка дня должна быть коллективной и направлена на эмоции и сближение 42:19\\nПримеры успешных финальных активностей: свечка, Lightning Talks, игра в «чья-чья» 42:19\\nПосле коллективной активности люди должны иметь свободу выбора: спать или продолжать общение 42:19", "Чрезмерная модерация создаёт барьеры к сближению и зажатость участников 47:35\\nРиск небезопасного поведения на Кэмпе низкий, так как отбор участников строгий 47:53\\nСтрогие правила безопасности могут осложнить атмосферу между людьми 47:35", "Приоритет — общение с людьми, которые симпатичны и не часто встречаются вне Кэмпа 56:36\\nЦель Кэмпа — чувствовать единение с группой, а не строить персональные отношения 54:57\\nНетворкинг и карьерные связи — не основная ценность Кэмпа 57:46", "", "Персональный клик характеров может привести к дружбе после первого Кэмпа 59:45\\nСовместное проживание и совместный опыт — сильные факторы для продолжения общения 01:00:11\\nСовместная организация Кэмпов способствует развитию дружеских отношений 01:00:44", "Интенсивные форматы сближения должны проводиться после постепенного погружения в атмосферу 48:37\\nАтмосфера доверия и безопасности достигается ощущением людей, а не только правилами 49:32\\nФорматы сближения работают, когда есть место уязвимости и возможности для релейта 50:12\\nСовместное переживание опыта — альтернативный способ достичь сближения участников 51:04\\nДля глубокого сближения предпочтительны общие форматы, где люди могут перемешиваться 53:05\\nФиксированные маленькие группы полезны как инструмент, но ограничивают интенсивность переживаний 53:31\\nКоллективное переживание важнее персональных связей для достижения катарсиса на Кэмпе 54:00", "Шумные и алкогольные форматы не вызывают негативных эмоций, если есть возможность не участвовать 01:02:06\\nЕдинственный негативный эффект — невозможность спать из-за шума 01:01:35\\nНа Кэмпах не наблюдалось проблемного пьяного поведения участников 01:02:25", "", "Телесная близость приемлема при наличии доверия и позитивных намерений участников 01:03:37\\nКомфортность телесных активностей зависит от общего состояния и атмосферы Кэмпа 01:03:14\\nСтранное поведение в адрес участника — редкое исключение на Кэмпе 01:04:13", "", "", "На первом Кэмпе ожидания были минимальными из-за неполного понимания формата 01:05:17\\nПервый Кэмп превысил ожидания благодаря теплоте и разнообразию форматов 01:06:13\\nНа последних Кэмпах ожидания были выше, впечатления — более смешанными 01:06:35", "", ""]}, {"id": 5, "cohort": "постоянные", "answers": ["- близость, сближение, эмоциональная близость\\n- поглащающая история\\n- жалко времени на то чтобы спать\\n- люди рассказывают интересное\\n- НЕ СЕКТА\\n- лагерь/детский лагерь/выезд", "-", "1. комната интровертошная, общалась в особенном формате, вдумчиво поболтать, никуда не бежим, а скорее отдыхаем\\n2. на старичковом кемпе — было застолье, ВАУ формат, тосты, взрывало мозг\\n\\n---\\n- большую роль сыграла подготовительная работа\\n- я интроверт, всякие форматы сближения; чек-ины — все это очень роляет. Иначе я бы ходила потерянная, благодаря перемешиванию и проактивному сближению", "Мне не очень интересно в моментах где кто-то, кто вещает (речь не про доклады, а про форматы). Не очень когда мы все собрались и сверху вниз слушаем про какие-то истории. Как пример QA Мотла. С другой стороны был Диванчик про архитектуру и затирал. Тема — большой фактор. И про то как это вещатель для себя лично видит цель происходящего. Самопрезентация не очень.", "", "Идеальный день — это суббота. Пятница еще слишком шокирующая.\\n\\nСуббота — просыпаюсь к зарядке\\nПозавтракать.\\nНадергать из программы + иметь время на рандомные коннекты.\\nНравится когда есть какой-то хайк или спорт в середине дня\\nПусть проходят форматы и я пропускать ок\\nКемп всегда про людей и про то чтобы были места для свободного общения\\nСложно теоретизировать какие форматы\\nБольше в сторону поделиться и увидеть друг друга\\nОчень прикольно когда есть бассейн. Необязательно вечеринка.\\nНапрягают шумные вечеринки, алкоголь и голые.\\nГде находится пик?\\nПоток мне ок, пик необязателен\\nЕда не супер важна\\nКлассно когда есть место где чай попить и с кем-нибудь законнектиться\\nПоследний момент — и вечеринка в бассейне и просто поболтать\\n\\nОдна / с кем-то: 30 х 70%\\n\\nНравиться иметь моменты, когда я записываю впечатления\\n\\nВажная часть идеального дня про тревогу — на прошлом кемпе была идеальная коммуникация. Можешь выбрать на конкретный слот чем заняться. ФИЧА: забить в календарь.", "Оптимальный микс форматов. Сложно вспомнить чисто интеллектуальный формат — я на них не особо хожу. Если человек рассказывает, то ценнее всего увидеть за этим самого человека. Может я пойду на такую тему потому что мне тема интересна, а может потому что человек. 20% таких форматов.\\n\\n30% — сближение. Мне обычно очень заходит.\\nНравятся — пронизывающие форматы в течение кемпа, «если вы хотите поговорить про Х, то найдите меня». Формат БИНГО в течение всего кемпа.\\n20% — полусвободное время, включая еду.\\n30% — движение, прогуляться, не слишком жесткие рамки и не лежать на месте. Крафт, вечеринка.", "", "", "", "Форматы на сближение да!\\n - класс: в группах до 5 человек, в тч 1-1, когда есть какая-то тема и вы её 15 минут обсуждаете\\n- я не очень люблю смоллтолки, люблю сближение. Вспоминаются какие-то слоты где в одной группе пообсуждали, потом перемешались. Какие-то есть заданные темы и в целом вы довольно гибкие что именно обсуждать. Круги Котова как крайнее проявление где ты можешь поговорить с большим количеством людей. Из-за шума плохо переношу, но концептуально нравится.\\n- не очень хочется риска застрять с кем-то, с кем не очень коннектишься. Про телесные не могу вспомнить. Кадл пати прикольно как.", "- Мне в знакомстве с новыми ценно то что я могу общаться как с существующими. Сближение со знакомыми важнее, но нужно вкладываться в новых.\\"", "", "С кем продолжаешь общаться\\n- очень нравится что есть чаты\\n- есть теперь мемный чат, мастермайнды, стабильно присутствующие люди в онлайне\\n- с кем общаться — общие интересы, онлайн, \\n- если с кем-то пересекаюсь вживую\\n\\nВ эту секцию можно вставить упоминание про старичковый ОРКЕМП: мне очень зашло как возможность выйти из кемпа в какую-то реальность.\\n\\nКомната декомпрессии — крафт, чаёк, ребрендинг чтобы экстраверты не боялись ходить.\\n\\nЯ бы рассмотрела остаться на день-два. Главное чтобы был общий чатик.", "\\"Форматы на сближение да!\\n - класс: в группах до 5 человек, в тч 1-1, когда есть какая-то тема и вы её 15 минут обсуждаете\\n- я не очень люблю смоллтолки, люблю сближение. Вспоминаются какие-то слоты где в одной группе пообсуждали, потом перемешались. Какие-то есть заданные темы и в целом вы довольно гибкие что именно обсуждать. Круги Котова как крайнее проявление где ты можешь поговорить с большим количеством людей. Из-за шума плохо переношу, но концептуально нравится.\\n- не очень хочется риска застрять с кем-то, с кем не очень коннектишься. Про телесные не могу вспомнить. Кадл пати прикольно как.", "Напрягают шумные вечеринки, алкоголь и голые.", "", "", "", "Кемп начался. Когда все садятся в автобус и тусят.\\nНе хочу упражнений на сближение в автобусе. Обсудить с соседом насколько хотите активно общаться.", "", "fair price\\n\\nМне от кемпа очень много пользы приносит.", "Начнём с  того что всё классно, спасать ничего не нужно. Уметь воспроизводить то что на кемпах уже есть — уже большая задача и многое дает.\\n\\nМне нравится участвовать в создании, когда обращаются/просят/предлагают. Я попыталась в отбор к прошлому кемпу.\\n\\nУкрасить в течение кемпа — приятно.\\n\\nВСЕГДА прожимать галочку чтобы ответы из фидбека приходили на почту — интересно перечитывать."]}, {"id": 6, "cohort": "новички", "answers": ["1. Что делает кэмп кэмпом\\n\\nКэмп для меня — это выезд людей, которые гипотетически могли бы составлять мой круг общения, но в обычной жизни им не являются, потому что живут в разных местах и просто не пересекаются.\\n\\nПо содержанию кэмп для меня — это смесь:\\n\\nобмена опытом, чем-то похожего на бизнес-конференцию,\\n\\nлагерных практик,\\n\\nнеформального общения на разные темы,\\n\\nпопытки узнать друг друга глубже.\\n\\n2. Можно ли что-то убрать и не поломать опыт кэмпа\\n\\nМне кажется, убрать что-то без потерь сложно.\\n\\nЕсли убрать людей, это уже будет совсем другое.\\nЕсли убрать глубокое общение, тоже.\\nЕсли убрать передачу опыта и содержательные форматы, кэмп, возможно, еще останется кэмпом, но пострадает контекст. Потому что сами форматы создают темы, общий пережитый опыт и основания потом подходить друг к другу и продолжать разговор.", "3. Что почти не влияет на ощущение, что кэмп удался\\n\\nИз того, что влияет не очень сильно, для меня это комфорт. У меня довольно низкие требования к бытовым условиям, так что я мог бы жить и в палатке.\\n\\nНо важно не столько удобство базы, сколько:\\n\\nчтобы она была удалена от города,\\n\\nчтобы была некоторая изоляция,\\n\\nчтобы было хотя бы базово тепло и нормально жить.\\n\\nТо есть комфорт сам по себе не так важен, а вот выделенность пространства важна.\\n\\n4. Какие люди важны для кэмпа\\n\\nДля меня важна не жесткая совпадаемость по взглядам, а скорее:\\n\\nоткрытость к диалогу,\\n\\nготовность обсуждать,\\n\\nспособность допускать, что ты можешь быть не прав.\\n\\nМоя рамка, возможно, шире, чем у текущего отбора, но она не бесконечная. Например, с людьми, которые поддерживают войну и не готовы это обсуждать, мне было бы некомфортно. А с теми, кто готов разговаривать, возможно, уже можно.\\n\\n5. Какие форматы не обязательны\\n\\nДля меня не так важен какой-то конкретный формат сам по себе, сколько разнообразие форматов.\\n\\nТо есть если убрать один конкретный формат, кэмп все равно останется кэмпом. Но если будет слишком сильный перекос во что-то одно и останется буквально пара одинаковых типов активностей, мне будет хуже.\\n\\nЕще я понял, что чисто лекционные форматы, где спикер просто говорит, а все сидят и слушают, для меня наименее значимы. Если бы вместо них были дискуссии, круглые столы, интеллектуальные игры или другие способы передачи опыта, для меня кэмп бы не пострадал.", "Для меня очень сильным моментом был хайкинг, когда мы шли и общались.\\n\\nПочему это было важно:\\n\\nэто был выход из череды плотных мероприятий,\\n\\nя уже успел составить впечатление о людях,\\n\\nможно было спокойно поговорить с теми, про кого уже что-то понял,\\n\\nэто давало отдых и ощущение большей субъектности.\\n\\nМне кажется, важной была именно комбинация: отдых, движение, уже сложившееся представление о людях и возможность говорить не в формате очередного мероприятия, а более естественно.", "Самый неприятный опыт для меня — провал моего диванчика. Тогда мое ощущение было таким, что на него никто не пришел, потому что параллельно шел другой формат, который очевидно должен был собрать больше людей.\\n\\nМне кажется, это можно было предсказать и просто не ставить эти события так, чтобы они конкурировали напрямую.\\n\\nЕсли говорить шире, то у меня была трудность с тем, что я слишком уставал. Когда мероприятий много подряд, я не всегда могу сам вовремя остановиться и дать себе отдых.", "Да, такое ощущение было.\\n\\nМне кажется, у меня есть собственная сложность: мне проще вести поверхностный разговор, чем более глубокий. И я часто из-за этого переживаю. На кэмпе это тоже проявлялось: я видел, что люди могут уходить глубже в общении, а мне это дается сложнее.\\n\\nПри этом я воспринимаю это скорее как свой личный дефицит, а не как проблему кэмпа.", "Мой идеальный день выглядел бы примерно так:\\n\\nУтром может быть зарядка, но опциональная. Хорошо, если она есть, но я, скорее всего, на нее не пойду.\\n\\nПотом завтрак.\\n\\nПосле завтрака несколько часов более плотной активности, скорее интеллектуальной: лекции, обсуждения, дискуссионные форматы.\\n\\nПотом активности другого рода: игровые или творческие.\\n\\nБлиже к вечеру мне нравятся более творческие штуки.\\n\\nЕще мне важны более расслабленные промежутки, когда можно передохнуть.\\n\\nИ в идеале в течение дня есть какая-то фоновая активность, которая проходит не непрерывно, а вспышками, возвращается и напоминает о себе.\\n\\nВ конце дня мне бы нравилась какая-то тематическая свечка или чек-ин, а потом, возможно, еще одна ночная активность — например, ролевая или станционная игра.", "Не хватило какой-то фоновой активности: мне нравится идея чего-то, что не требует постоянного участия, но время от времени подталкивает людей к взаимодействию.\\n\\nНапример:\\n\\nкакие-то карточки или вопросы для случайных разговоров,\\n\\nповод подойти к человеку и начать более глубокое общение,\\n\\nнебольшие всплывающие напоминания о том, что можно пойти и поговорить.\\n\\nТо есть не обязательная игра на весь день, а скорее крючок, который помогает людям начинать более содержательные контакты.", "Открытие и закрытие важны - они дают рамку опыта (ссылется на свой опыт работы вожатым в лагере)", "На глобальном уровне мне спонтанные форматы нравятся.\\nНо локально я их боюсь, потому что они уменьшают предсказуемость.\\n\\nТо есть у меня к ним отношение такое: и хочется, и колется.\\n\\nЯ думаю, что в хороших руках спонтанные форматы скорее работают на кэмп. Да, у них больше риск, что что-то пойдет не так, но они могут сильно оживлять процесс.\\n\\nУ самого у меня идеи спонтанных форматов возникали, но чаще в логике “в следующий раз можно сделать вот это”, а не в логике “прямо сейчас пойду и проведу”.", "Было классно, когда мы на вечерних чек-инах подводили итоги дня", "Да, я люблю модерируемое знакомство.\\nМне нравится, когда есть проводной, организованный формат, который помогает людям познакомиться.\\n\\nМне также нравится, когда есть и более глубокое общение.\\n\\nПри этом у меня есть некоторый скепсис насчет того, насколько такие форматы реально “растапливают лед”. Но пока этот скепсис не перевешивает моей общей любви к ним.", "На этом кэмпе у меня почти не было знакомых людей, кроме буквально пары человек, поэтому я в основном общался с новыми людьми и был этим доволен.\\n\\nЕсли говорить в целом, то я, наверное, стараюсь соблюдать баланс, но с некоторым перевесом в сторону уже знакомых людей, потому что если я их давно не видел, мне важно в эти отношения тоже вкладываться.\\n\\nПри этом я не хочу общаться только со знакомыми. Для меня скорее естественно: пообщаться с теми, кого уже знаешь, и параллельно искать новые контакты.", "Мне важно просто создавать контакты с разными людьми, с которыми можно разные точки зрения можно обсуждать", "Пока такого человека у меня нет.\\n\\nЯ думаю, что для меня одной точки контакта недостаточно, чтобы что-то устойчивое возникло. Мне нужно хотя бы несколько пересечений, чтобы отношения начали складываться.\\n\\nСейчас некоторые связи, возможно, начинают чуть больше развиваться через рандом-кофе, но пока это еще скорее процесс, чем уже сформировавшаяся дружба.", "Мне понравилось, что группы не менялись.\\n\\nПочему:\\n\\nи так очень много перемешивания в течение дня,\\n\\nстабильная группа дает ощущение опоры,\\n\\nесли это формат про глубину, то важно иметь возможность возвращаться к тому, что человек говорил раньше, и видеть развитие его состояния.\\n\\nУ меня не было желания сбежать из своей группы или сменить ее.", "Я проспал большую часть ночных форматов, но не потому, что они мне не нравятся, а потому что просто сильно уставал.\\n\\nУ меня нет принципиального негатива к таким форматам. Я не чувствую себя в них как рыба в воде, но понимаю, что это скорее мои внутренние особенности, а не проблема формата.\\n\\nМне нравится, что они есть.", "-", "У меня довольно позитивное отношение к телесности, если это:\\n\\nне сексуализировано,\\n\\nпроводится с нормальной модерацией,\\n\\nс уважением к границам.\\n\\nФоновая телесность, вроде легкого грима, прикосновений, каких-то мягких телесных взаимодействий, для меня скорее ок.\\n\\nНо если бы был отдельный формат, специально направленный именно на интенсивную телесную близость, например отдельная кадл-пати, мне было бы уже менее комфортно.", "Мне важны активности, которые есть в сообществе - через них можно укреплять свои позиции в сообществе", "Когда для меня кэмп начинается\\n\\nНачинается он постепенно.\\n\\nСначала — когда собираешь вещи.\\nПотом сильнее — когда приезжаешь в аэропорт и начинаешь координироваться с другими участниками.\\nПотом — когда видишь первых людей и начинаешь разговаривать в автобусе.\\nА уже на самом кэмпе одной из главных точек старта для меня стал первый чек-ин: он как будто помог “доприехать” и внутренне войти в процесс.\\n\\nКогда для меня кэмп заканчивается\\n\\nУ меня тоже не было одной жесткой точки конца.\\n\\nБыло две основные точки:\\n\\nкогда после окончания кэмпа мы еще ездили в гости и я понимал, что это уже пост-кэмповое продолжение,\\n\\nи когда я уже уезжал дальше, понимая, что теперь все, больше не будет следующего этапа общения с этими людьми.\\n\\nТо есть кэмп у меня заканчивался не в момент официального конца программы, а уже после.", "Я не могу сказать, что мыслил в терминах ценности. Скорее это было желание посмотреть на место, которым Аня так прониклась. Я посмотрел и понял. \\nПри этом наверно главная ретроспективная ценность - что я после кемпа немного встряхнулся. А то в Китае слишком сосредоточился на науке, что в целом-то неплохо, но погасило остальные стороны личности", "я оцениваю как \\"точно дорого, но справедливо\\". В плане субъективно, конечно, мне очень жалко тратить столько денег на что бы то ни было.\\nПри этом объективно я понимаю, что на такое меро нужны деньги и опять таки по порядку величины кажется столько сколько есть", "Мне кажется, кэмп стал бы лучше, если бы:\\n\\nБыло больше совместной подготовки каких-то штук.\\nНе только участие в готовом, но и возможность вместе что-то делать, собирать, придумывать. Это усиливает субъектность.\\n\\nУ участников было больше поддержки для запуска собственных форматов.\\nНапример, возможность получить помощь от кого-то более опытного, если хочешь что-то провести.\\n\\nСтоило бы еще подумать над форматами вроде свечек, чек-инов и телесных практик.\\nНе в смысле убрать их, а посмотреть, как их можно подкрутить и улучшить.\\n\\nМне лично хотелось бы чуть больше пространства для замедления.\\nНе обязательно в виде жестко заданного отдыха, а скорее как возможности чуть мягче проживать программу."]}, {"id": 7, "cohort": "корги", "answers": ["- МЫ собираем людей с общими ценностями максимально разных во всех остальных вопросах\\n- Собираемся вместе чтобы поговорить на темы на которые обычно не говорят\\n- Прожили экспириенс которого в обычной жизни нет, особое сближение\\n\\nОсобый опыт:\\n- сильное сближение с людьми которых ты раньше не знал\\n- темы для разговоров с кем не говорил\\n- новые темы про которые не пересекались\\n- нетривиальные темы\\n- степень открытости и искренности\\n\\nКакие темы? — про свои личные переживания, личная история, про что ты\\nнеобычности неконвенциональности\\nчего можно пристыдиться в другом кругу\\nот странных хобби до слабостей и провалов\\nконцептуально сложные вопросы", "", "- Первый овершеринг на последнем кемпе. Необычный и ценный опыт. Человек 6 явно сказали, что не ожидали что с ними может такое произойти.\\n- Каддл пати первая. Было очень здорово. Опыт, который я не ожидал, что он случится.\\n- «То что я про  тебя не знаю» — игра\\n- Глубокий разговор с участниками, просто", "- НЕ ОК. Очень расстроил финал последнего кемпа — это было обидно. Я как опытный участник знаю что это радостная точка, где хочется почувствовать. Не было создано эмоциональной атмосферы, улица, не могли почувствовать себя вместе. Просто плохо сделано. Не нравится «церемония закрытия». Есть момент, когда кемп закончился. Этот момент важно делать ярким. Есть другой момент — момент рефлексии, «что здесь произошло». Момент финала создает эмоцию на всё движение назад. Настроение может быть простым, а может быть необычным. Закрытие последнего кемпа. Раньше направляли внимание на то что произошло. Ниточки завязывали, записывали привет. «Это произошло».\\n- Начало турецкого кемпа было отвратительным. Не сказаны критически важные вещи. Просто гадкое.\\n- Открытие начали раньше чем обещали — кто-то опоздал. Это стыдно.\\n- Вещи, где ты ожидаешь хороший уровень разговор — а там происходит не особо. Кринжовые ведущие.\\n- Настя направила людей делать всякие вещи без разговора про консент.\\n- Сильно разочаровало застолье в Сербии. Застолье ассоциируется с замшелыми традициями. Тосты прерывают разговор.", "- после застолья было ощущение «я не вписываюсь». Все развалилось. Организаторы назвали несуществующее место для диванчика. Ощущение потерянности. Либо идти на караоке, либо ныть с теми кто не любит караоке.", "Идеальный день — пятница или суббота:\\n- Пятница.\\n    - Первая половина дня ты чувствуешь какие все классные и как тут офигенно\\n    - Вторую половину дня ты чувствуешь что с этими людьми ты становишься другим, погружаешься в классные и глубокие вещи. Подурачиться. Впечатление что ты в окружении интересных людей. Они тобой тоже и ания.\\n\\nОднако расписание не должно быть слишком жёстким.4. Проблема расписания\\n\\nГлавный недостаток программы — слишком жёсткая структура.\\n\\nИз-за этого возникает:\\n\\nощущение спешки\\n\\nневозможность закончить мысль\\n\\nдавление тайминга.\\n\\nОсобенно болезненно это ощущается для выступающих.\\n\\nВозможное решение\\n\\nДобавлять буферные промежутки между форматами.\\n\\nНапример:\\n\\n10 минут между событиями\\n\\nвозможность чуть продлить формат.\\n\\nЭто снизит напряжение.\\n\\n5. FOMO (страх пропустить)\\n\\nСильное ощущение FOMO возникает из-за:\\n\\nбольшого количества параллельных форматов\\n\\nплотного расписания.\\n\\nДенис считает, что это ощущение стоит уменьшить, даже если полностью убрать его невозможно.", "1. Совместное пение нигунов\\n\\nОчень запомнился момент, когда участники спонтанно пели нигуны у костра.\\n\\nПочему это было сильным моментом:\\n\\nатмосфера\\n\\nспонтанность\\n\\nколлективное переживание.\\n\\nПо его мнению, такие вещи невозможно заранее спланировать.\\n\\n2. Посиделки у костра\\n\\nДругой важный момент — сидение у костра и совместное пение.\\n\\nДля него это:\\n\\nкомфортная форма общения\\n\\nспокойная атмосфера\\n\\nощущение общности.\\n\\nТакие моменты сильно связаны с пространством и средой, а не только с программой.", "8. Негативный опыт\\n\\nСамый неприятный момент связан с его собственным выступлением.\\n\\nПроблема возникла из-за:\\n\\nжёсткого тайминга\\n\\nневозможности закончить выступление.\\n\\nЕго прервали из-за ограничения времени, что вызвало:\\n\\nсильное разочарование\\n\\nощущение обрыва.\\n\\nПосле этого даже возникло чувство:\\n\\n«зачем я вообще приехал».\\n\\n9. Что можно было улучшить\\n\\nОрганизаторы могли бы снизить такие ситуации, если бы:\\n\\nзакладывали буфер между выступлениями\\n\\nпозволяли чуть гибче завершать форматы.\\n\\nДаже дополнительные 2 минуты могли бы изменить переживание.", "Иногда на кэмпе возникает ощущение несоответствия.\\n\\nПричины:\\n\\n1. Высокий уровень социальных навыков\\n\\nУчастники часто:\\n\\nочень общительные\\n\\nуверенные\\n\\nсоциально активные.\\n\\nЭто может создавать давление для людей с меньшим уровнем социальных навыков.\\n\\n2. Физический компонент некоторых форматов\\n\\nНекоторые активности требуют:\\n\\nфизической подготовки\\n\\nвыносливости.\\n\\nНапример, одна ролевая игра требовала выполнения упражнений в планке, что стало барьером для участия.\\n\\nДля людей с травмами или низкой физической подготовкой такие механики могут быть проблемой.", "11. Идеальный день на кэмпе\\n\\nНесколько ключевых элементов идеального дня:\\n\\nУтро\\n\\nопциональная зарядка\\n\\nзавтрак как начало дня.\\n\\nВажно, чтобы человек не чувствовал, что уже что-то пропустил, если проснулся позже.\\n\\nДневная программа\\n\\nблоки форматов\\n\\nпространство для естественного продолжения разговоров.\\n\\nПустые блоки\\n\\nДенис считает важным добавлять специально пустые слоты, чтобы:\\n\\nобсуждать услышанное\\n\\nделать спонтанные активности\\n\\nотдыхать.", "Очень полезно иметь место, где можно:\\n\\nпобыть отдельно\\n\\nзаняться чем-то своим\\n\\nотдохнуть от социальной нагрузки.\\n\\nВажно, чтобы это было не просто место тишины, а пространство, где можно делать что-то спокойное.", "Нет идеи", "Денис очень положительно относится к спонтанным форматам.\\n\\nСреди запомнившихся:\\n\\nпоход на обрыв\\n\\nэкскурсия\\n\\nночные разговоры\\n\\nгитарные посиделки.\\n\\nИменно такие активности часто становятся самыми живыми.", "Хочется, скорее, иметь возможность отдохнуть в конце дня и переключиться", "Модерируемые психологические форматы вызывают амбивалентные чувства.\\n\\nПроблема в том, что иногда они могут восприниматься как:\\n\\nслишком интенсивные\\n\\nслишком личные\\n\\nпохожие на «психологические практики без контекста».\\n\\nУ некоторых людей это может вызывать настороженность.\\n\\nВозможное решение\\n\\nДобавлять объяснение и контекст для новичков, чтобы:\\n\\nбыло понятно, что происходит\\n\\nснизилось ощущение «сектантского формата».", "Старается вкладываться в социальную динамику вообще", "Для души", "Кого-то конкретного назвать не может, но старается общаться с кемперами в каждом городе, куда приезжает", "Модерируемые психологические форматы вызывают амбивалентные чувства.\\n\\nПроблема в том, что иногда они могут восприниматься как:\\n\\nслишком интенсивные\\n\\nслишком личные\\n\\nпохожие на «психологические практики без контекста».\\n\\nУ некоторых людей это может вызывать настороженность.\\n\\nВозможное решение\\n\\nДобавлять объяснение и контекст для новичков, чтобы:\\n\\nбыло понятно, что происходит\\n\\nснизилось ощущение «сектантского формата».", "Алкогольные форматы воспринимаются нормально, если:\\n\\nони не становятся доминирующими\\n\\nлюди остаются ответственными.\\n\\nГлавное, чтобы вечером сохранялась возможность:\\n\\nспокойно лечь спать\\n\\nне мешать другим участникам", "Если делать их в отдельном месте и хорошо шумоизолировать", "Денис нормально относится к:\\n\\nлёгким объятиям\\n\\nдружескому контакту.\\n\\nНо более интенсивные телесные практики для него некомфортны.\\n\\nЭто связано:\\n\\nс личными убеждениями\\n\\nс границами телесности.", "Старается участовать и организовывать активности в сообществе, но жалуется на то, что не все его активности принимают", "17. Когда начинается кэмп\\n\\nПо его ощущению, кэмп начинается ещё до приезда.\\n\\nПроцесс выглядит так:\\n\\nСбор вещей\\n\\nДорога\\n\\nВстреча с участниками в аэропорту\\n\\nТрансфер.\\n\\nУже на этих этапах появляется ощущение начала события.\\n\\n18. Важность трансфера\\n\\nТрансфер — важная часть опыта.\\n\\nЕго можно использовать для:\\n\\nобщения\\n\\nигр\\n\\nмузыки\\n\\nзнакомства.\\n\\nЭто пространство уже является частью кэмпа.", "Встреча с людьми, реализация форматов, понять что-то про себя, про общение + найти друзей = были инсайты, был отдых, но друзей не нашёл - это непредсказуемо.", "Мне нормально", "Самое важное улучшение — больше дружелюбия и мягкости в социальной динамике.\\n\\nИногда участники реагируют слишком строго, когда что-то идёт не по плану.\\n\\nХотелось бы больше:\\n\\nтерпимости\\n\\nпринятия\\n\\nгостеприимства.\\n\\nНа время кэмпа люди могли бы осознанно переходить в более дружелюбный режим взаимодействия."]}, {"id": 11, "cohort": "постоянные", "answers": ["Сам ивент неохеренно отличается. Он отличается в первую очередь составом участников, а всем остальным во вторую. Много интересных людей, несколько больше, чем я привык, заморочек на всякой инклюзии. Давайте не будем друг друга никак травмировать совсем (бережность). Много штук про Authentic Relating Games, больше, чем в других местах.\\n\\nНо сама программа не какая-то особенная. То есть это какой-то кэмп, в общем, хорошо сделанный кэмп классный.\\n\\nЯ бы сказал, что отличие ровно состава участников. Само мероприятие по программе не уникальное.\\n\\nС чем я сравниваю?\\n\\nЕсть SLP, есть IT-регаты, есть из того, где я был, наверное, есть какие-то хакатоны. У меня, понятно, есть мои всякие ролевые конвенты. Они специфические. Ближе всего, наверное, SLP off-site.\\n\\nПоскольку на SLP приезжают люди конкретно предприниматели, технические предприниматели и общая идея про то, что быть предпринимателем классно, мы классные, круто делать бизнес. И там больше вообще в принципе такого типа давайте покажем, что мы все классные друг другу. Типа валидируем друг друга, что мы классные и будем говорить про то, как быть классными. Это несколько утомляет меня.\\n\\nНа самом деле, при этом люди хорошие. В SLP тоже есть фильтр, он другой. И других отбирает чуваков.\\n\\nДля меня уникальная фишка/впечатление, которое у меня бывает, кроме от Вайкемпа (АмпКемпа), только на моих ролевых тузах, оно такое, что можно с любым человеком, который мне встретится, начинать общаться, знаю я его или не знаю, и будет интересно.\\n\\nПочему будет интересно?\\n\\nПотому что он, во-первых, будет не тупой.\\n\\nВажный еще момент, на самом деле он иногда бывает среди участников, иногда отбор промахивается. Меня тяжело с людьми, у которых, что называется, стакан полон. В смысле, имеется в виду это буддийская херовина, они знают уже истину, и им ничего нельзя сказать, потому что они все уже знают. И как с ними общаться, непонятно.\\n\\nНа кемпе, чуваки заинтересованы тебя слушать, и я заинтересован их слушать, и это классно и редко. Они доброжелательные, но при этом достаточно могут быть ехидными какими-нибудь или доброжелательные, но не притерные. Еще разнообразные.\\n\\nДля меня есть мой эвент, который я делаю периодически. Он называется «Ролевой методический лагерь». И там это все тоже есть, но у него другой совершенно формат, потому что это практическая лаборатория, где мы делаем игры, и там много кранча. Но поскольку тут приезжают люди, которые приехали делать игру, и готовы кранчить три дня, это само по себе является фильтром, и чуваки тоже прикольные.\\n\\nНо это другие чуваки, потому что в амкемпе еще есть некоторые, на самом деле, имущественные фильтры. То есть это не плюс, а особенность. Это в целом социально успешные люди, примерно.", "До хрена всяких.\\n\\nПо-другому компоновать программу, сменить там страну.\\n\\nНа самом деле я еще очень достаточно неприхотливый в бытовых условиях. То есть, условно говоря, если сделать кемп в палатках, мне тоже будет окей примерно.\\n\\nМожно ли облажать кэмп на этом же наборе людей? Конечно, можно.\\n\\nЯ знаю, как мне сделать плохо.\\n\\nВоспринимаемой уникальной фичей Кэмпа было то отсутствие некоторого специфического говна, а именно я плохо отношусь ко всякой бытовой мистике, биоэнергетике, тантра-йоге, которая пытается делать вид что она психология там и вот это вот всякое вот такое короче я не люблю колдунов вот и короче мне некоторое было насчет идея что значит территория свободно от колдунов, но нет. Если колдунов будет больше, я такой - \\"ну блин, ну здравствуйте\\".\\n\\nНапример, вот в SLP этого больше, чем в ампкемпе, потому что у предпринимателей и вообще у умных, успешных людей есть как запрос на сакральное, и когда они пытаются его самостоятельно закрывать, они вот такой пургой закрывают. И когда при этом оно может быть достаточно впечатляющее индивидуально.\\n\\nЯ поскольку ролевыми играми занимаюсь, знаю, насколько несложно людей ввести в трансовое состояние и довести их до катарсиса, изрядно нагадив им в голову при этом. И когда люди через такое проходят, говорят, господи, как классно, и пытаются мне рассказать, что это классно, а я такой, нет, это не классно.\\n\\nТакого сейчас на Кэмпе нету, если будет, будет плохо.\\n\\nМожно читать скучные лекции в целом. Если программа будет состоять... Короче, турецкий кэмп был, по впечатлению, по уровню лекций мне нравилось больше, чем на последнем кэмпе. Но на турецком кемпе у меня было впечатление, что лекции одновременно очень разнообразные, нельзя сказать про что вообще, а при этом они все хорошие.\\n\\nЭто удивительный факт.\\n\\nПотому что их интересно слушать, а вообще на большинстве конференций, если каждая третья лекция ничего, то это классно.\\n\\nБывают исключения, я периодически работаю в программном комитете продуктовой секции Дампа, и там, мне кажется, что у нас почти все лекции получаются хорошие, но они получаются хорошими, потому что мы изрядно долго доманываем спикеров. Мы заставляем им делать несколько прогонов, очень много фильтрации и так далее. И, по-моему, в Кэмпе этой работы не происходит.\\n\\nКлассный умный человек с отличным опытом может совершенно спокойно прочесть совершенно отвратительную лекцию, потому что это отдельный жанр.\\n\\nИ в этом смысле вот тут можно программу сделать стрёмной весьма легко.", "Я думаю... для наверно для меня это были открывающие эти Authentic Relating Games от Вани Белотелова на Баба Кемпе во многом потому что то ну просто знакомство с комьюнити. Когда приехал я вообще никого не знал кроме Димы и Саши Гартман, и больше не знал вообще никого.\\n\\nИ он такой, какие-то чуваки, и они сейчас что-то будут делать интерактивное, а я всякого интерактивного видал, ну это си
